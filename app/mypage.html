</style>

  try{var s=localStorage.getItem('codibank_session');if(!s)window.location.replace('login.html');else document.documentElement.style.visibility='visible';}
  catch(e){window.location.replace('login.html');}

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100dvh;width:100%;background:#071952;color:#fff;
    font-family:'Pretendard','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}
  .bg-mesh{
    background:radial-gradient(at 0% 0%,rgba(11,102,106,.25) 0px,transparent 55%),
              radial-gradient(at 100% 80%,rgba(53,162,159,.15) 0px,transparent 55%),#071952;
    min-height:100dvh;
  }
  header{position:sticky;top:0;z-index:100;background:rgba(7,25,82,0.92);
    backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.08);
    padding:16px 20px;display:flex;align-items:center;gap:12px;}
  header h1{font-size:18px;font-weight:800;}
  .profile-card{
    margin:20px;border-radius:24px;padding:24px;
    background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
    border:1px solid rgba(255,255,255,.12);
    display:flex;align-items:center;gap:16px;
  }
  .avatar{width:64px;height:64px;border-radius:50%;
    background:linear-gradient(135deg,#0B666A,#35A29F);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .menu-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
    cursor:pointer;transition:background .15s;
  }
  .menu-item:hover{background:rgba(255,255,255,.04);}
  .menu-item-left{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.9);font-size:15px;font-weight:600;}
  .menu-section{margin:16px 0 4px 20px;font-size:11px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:.08em;}
  .badge-plan{background:rgba(151,254,237,.15);border:1px solid rgba(151,254,237,.3);
    color:#97FEED;font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;}
  .btn-logout{
    width:100%;padding:15px;border-radius:16px;border:none;cursor:pointer;
    background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.22);
    color:#ff6b6b;font-size:15px;font-weight:700;font-family:inherit;transition:opacity .15s;
  }
  .btn-logout:active{opacity:.8;}


/* ── 풋바: Floating Glassmorphic Bar ── */
.cb-nav{position:fixed;bottom:0;left:0;right:0;z-index:99999;padding:0 16px 10px;pointer-events:none;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.cb-nav-inner{pointer-events:all;max-width:400px;margin:0 auto;height:62px;border-radius:9999px;background:rgba(7,19,42,.55);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:0 24px 48px -8px rgba(2,13,36,.45);display:flex;justify-content:space-around;align-items:center;padding:0 6px;}
.cb-nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(216,226,255,.4);text-decoration:none;padding:6px 12px;border-radius:9999px;transition:all .2s;font-family:'Inter','Noto Sans KR',sans-serif;}
.cb-nav-tab .ni{font-family:'Material Symbols Outlined';font-size:22px;line-height:1;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 22;}
.cb-nav-tab .nl{font-size:9px;font-weight:600;letter-spacing:.02em;}
.cb-nav-tab.on{color:#07132a;background:linear-gradient(135deg,#4cdbce,#13bbaf);padding:6px 16px;}
.cb-nav-tab.on .ni{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 22;}
.cb-spacer{height:82px;}
</style>

<body class="bg-mesh">
<header>
  <span class="material-symbols-outlined" style="color:#97FEED;font-size:26px;">person</span>
  <h1>마이페이지</h1>
</header>

<main style="padding-bottom:100px;">
  <!-- 프로필 -->
  <div class="profile-card">
    <div class="avatar" id="avatarWrap">
      <span class="material-symbols-outlined" id="avatarIcon" style="font-size:32px;color:#97FEED;font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 24;">person</span>
      <img id="avatarImg" src="" alt="" style="display:none;width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid #97FEED;"/>
    </div>
    <div>
      <div id="userName" style="font-size:18px;font-weight:800;margin-bottom:4px;">사용자</div>
      <div id="userEmail" style="font-size:13px;color:rgba(255,255,255,.45);margin-bottom:6px;"></div>
      <span class="badge-plan" id="userPlan">FREE</span>
    </div>
  </div>

  <!-- 메뉴 -->
  <p class="menu-section">계정 관리</p>
  </body>
