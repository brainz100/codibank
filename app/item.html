<script>
  // Auth
  if (window.CodiBank && CodiBank.requireAuth) {
    CodiBank.requireAuth('login.html');
  }
  const user = CodiBank.getCurrentUser();

  // Utilities
  function getParam(name) {
    const p = new URLSearchParams(window.location.search);
    return p.get(name);
  }

  const id = getParam('id');

  // Back
  const backBtn = document.getElementById('backBtn');
  backBtn.addEventListener('click', () => {
    if (history.length > 1) history.back();
    else window.location.href = 'closet.html';
  });

  let currentItem = null;

  async function renderItem(item) {
    if (!item) return;

    const catMeta = CodiBank.getCategoryMetaByKey(item.categoryKey, item.userEmail);
    const _catNameEl = document.getElementById('categoryName'); if(_catNameEl) _catNameEl.textContent = catMeta?.label || '카테고리';
    document.getElementById('itemTitle').textContent = item.brand ? `${item.brand}` : '아이템';
    document.getElementById('itemBrandTag').textContent = item.brand ? item.brand : (item.color ? item.color : 'AI 등록');
    document.getElementById('itemColorTag').textContent = item.color ? item.color : '컬러 미정';
    // 중복 단어 제거
    function dedupeNote(t) {
      if (!t) return t;
      const seen = new Set();
      return t.trim().split(/\s+/).filter(w => {
        const k = w.toLowerCase();
        return seen.has(k) ? false : (seen.add(k), true);
      }).join(' ');
    }
    document.getElementById('itemNote').textContent = (item.note && String(item.note).trim())
      ? dedupeNote(String(item.note).trim())
      : '아이템 설명이 아직 없습니다. “수정”에서 특징을 추가해보세요.';

    // Images
    const main = document.getElementById('mainImage');
    const strip = document.getElementById('thumbStrip');

    strip.innerHTML = '';
    const imgs = [
      { ref: item.images?.front, label: '전면' },
      { ref: item.images?.back, label: '후면' },
      { ref: item.images?.brand, label: '브랜드·기타' },
    ].filter((x) => !!x.ref);

    function setSelected(idxSelected) {
      Array.from(strip.children).forEach((c, idx) => {
        c.className =
          idx === idxSelected
            ? 'w-20 h-20 flex-shrink-0 rounded-2xl overflow-hidden border-2 border-accent shadow-lg shadow-accent/20'
            : 'w-16 h-16 flex-shrink-0 rounded-xl overflow-hidden opacity-60';
      });
    }

    if (!imgs.length) {
      strip.innerHTML = '<div class="text-xs text-slate-400 px-2">이미지가 없습니다.</div>';
      main.removeAttribute('src');
      return;
    }

    imgs.forEach((x, i) => {
      const w = document.createElement('button');
      w.className =
        i === 0
          ? 'w-20 h-20 flex-shrink-0 rounded-2xl overflow-hidden border-2 border-accent shadow-lg shadow-accent/20'
          : 'w-16 h-16 flex-shrink-0 rounded-xl overflow-hidden opacity-60';
      w.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 text-xs">로딩…</div>`;
      w.dataset.src = '';
      w.addEventListener('click', () => {
        const src = w.dataset.src;
        if (src) {
          main.src = src;
          setSelected(i);
        }
      });
      strip.appendChild(w);

      CodiBank.getImageSrc(x.ref).then((src) => {
        if (!src) {
          w.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 text-xs">이미지 없음</div>`;
          return;
        }
        w.dataset.src = src;
        w.innerHTML = `<img alt="${x.label}" class="w-full h-full object-contain bg-white" src="${src}"/>`;
        if (i === 0) {
          main.src = src;
          setSelected(0);
        }
      });
    });
  }

  // ─────────────────────────────────────────
  // Edit Modal
  // ─────────────────────────────────────────
  const editModal = document.getElementById('editModal');
  const editBtn = document.getElementById('editBtn');
  const deleteBtn = document.getElementById('deleteBtn');

  const editClose = document.getElementById('editClose');
  const editCancel = document.getElementById('editCancel');
  const editSave = document.getElementById('editSave');

  const editCategory = document.getElementById('editCategory');
  const editBrand = document.getElementById('editBrand');
  const editColor = document.getElementById('editColor');
  const editNote = document.getElementById('editNote');

  function openEditModal() {
    if (!editModal || !currentItem) return;

    // categories
    const cats = CodiBank.getCategoriesForUser(user.email) || [];
    editCategory.innerHTML = cats
      .map((c) => `<option value="${String(c.key)}">${String(c.label)}</option>`)
      .join('');

    editCategory.value = String(currentItem.categoryKey || 'etc');
    editBrand.value = String(currentItem.brand || '');
    editColor.value = String(currentItem.color || '');
    if (editNote) editNote.value = String(currentItem.note || '');

    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
  }

  function closeEditModal() {
    if (!editModal) return;
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
  }

  editBtn?.addEventListener('click', openEditModal);
  editClose?.addEventListener('click', closeEditModal);
  editCancel?.addEventListener('click', closeEditModal);

  editSave?.addEventListener('click', () => {
    if (!currentItem) return;

    const patch = {
      categoryKey: String(editCategory.value || currentItem.categoryKey || 'etc'),
      brand: String(editBrand.value || '').trim(),
      color: String(editColor.value || '').trim(),
      note: String(editNote?.value || '').trim(),
    };

    const res = CodiBank.updateItem(user.email, currentItem.id, patch);
    if (!res || res.ok !== true) {
      alert((res && res.error) ? res.error : '저장에 실패했습니다.');
      if (String(res?.error || '').includes('한도')) window.location.href = 'pricing.html';
      return;
    }

    currentItem = res.item;
    renderItem(currentItem);
    closeEditModal();
  });

  deleteBtn?.addEventListener('click', () => {
    if (!currentItem) return;
    if (!confirm('이 아이템을 삭제할까요?')) return;

    const res = CodiBank.deleteItem(user.email, currentItem.id);
    if (!res || res.ok !== true) {
      alert((res && res.error) ? res.error : '삭제에 실패했습니다.');
      return;
    }
    alert('삭제되었습니다.');
    window.location.href = 'closet.html';
  });

  // ─────────────────────────────────────────
  // Share / Sell quick actions
  // ─────────────────────────────────────────
  async function shareCurrentImage() {
    const main = document.getElementById('mainImage');
    const src = main?.getAttribute('src') || '';
    if (!src) return alert('공유할 이미지가 없습니다.');

    try {
      const blob = await fetch(src).then((r) => r.blob());
      const file = new File([blob], 'codibank_item.png', { type: blob.type || 'image/png' });

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: '코디뱅크 아이템', files: [file] });
        return;
      }

      // fallback: download
      const a = document.createElement('a');
      a.download = 'codibank_item.png';
      a.href = URL.createObjectURL(blob);
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    } catch (e) {
      console.warn('share failed', e);
      alert('공유/저장에 실패했습니다.');
    }
  }

  document.getElementById('shareTopBtn')?.addEventListener('click', shareCurrentImage);
  document.getElementById('sellTopBtn')?.addEventListener('click', () => {
    if (!currentItem) return;
    window.location.href = `sale-item.html?id=${encodeURIComponent(currentItem.id)}`;
  });

  // Init
  (function init() {
    if (!id) {
      alert('아이템 ID가 없습니다.');
      window.location.href = 'closet.html';
      return;
    }

    currentItem = CodiBank.getItemById(id);
    if (!currentItem) {
      alert('아이템을 찾을 수 없습니다.');
      window.location.href = 'closet.html';
      return;
    }

    // 권한 체크(내 아이템만 수정 가능)
    if (String(currentItem.userEmail || '') !== String(user.email || '')) {
      console.warn('권한 없음: 다른 사용자의 아이템');
    }

    renderItem(currentItem);
  })();
</script>
