<script>
  // Auth
  if (window.CodiBank && CodiBank.requireAuth) {
    CodiBank.requireAuth('login.html');
  }
  const user = CodiBank.getCurrentUser();

  // Utilities
  function getParam(name) {
    const p = new URLSearchParams(window.location.search);
    return p.get(name);
  }

  const id = getParam('id');

  // Back
  const backBtn = document.getElementById('backBtn');
  backBtn.addEventListener('click', () => {
    if (history.length > 1) history.back();
    else window.location.href = 'aicloset.html';
  });

  let currentItem = null;

  // Color/Material translation maps for English mode
  const _colorEN = {'블랙':'Black','검정':'Black','다크 그레이':'Dark Gray','라이트 그레이':'Light Gray','차콜':'Charcoal','화이트':'White','흰색':'White','오프 화이트':'Off White','아이보리':'Ivory','네이비':'Navy','라이트 블루':'Light Blue','블루':'Blue','베이지':'Beige','브라운':'Brown','다크 브라운':'Dark Brown','라이트 브라운':'Light Brown','카키':'Khaki','올리브':'Olive','카멜':'Camel','레드':'Red','버건디':'Burgundy','핑크':'Pink','오렌지':'Orange','옐로우':'Yellow','그린':'Green','민트':'Mint','퍼플':'Purple','라벤더':'Lavender','크림':'Cream','와인':'Wine','인디고':'Indigo','데님':'Denim','그레이':'Gray','샌달 브라운':'Sandal Brown','레이진 블랙':'Raisin Black','Tue이트':'Taupe','다Rain 그레이':'Dark Gray'};
  const _matEN = {'면':'Cotton','혼방':'Blend','데님':'Denim','폴리에스터':'Polyester','울':'Wool','캐시미어':'Cashmere','린넨':'Linen','나일론':'Nylon','실크':'Silk','플리스':'Fleece','기모':'Brushed','코튼':'Cotton','레이온':'Rayon','스웨이드':'Suede','가죽':'Leather','트위드':'Tweed','저지':'Jersey','벨벳':'Velvet','코듀로이':'Corduroy','루즈':'Loose','슬림':'Slim','오버핏':'Overfit','레귤러':'Regular','스트레이트':'Straight','와이드':'Wide','크롭':'Crop','수트':'Suit','자켓':'Jacket','코트':'Coat','셔츠':'Shirt','니트':'Knit','가디건':'Cardigan','팬츠':'Pants','스커트':'Skirt','청바지':'Jeans'};
  function _translateNote(text) {
    if (!text || !(window.CodiBankI18n && CodiBankI18n.isEn())) return text;
    let result = text;
    // Sort by length desc to match longer phrases first
    const allMap = Object.assign({}, _colorEN, _matEN);
    const keys = Object.keys(allMap).sort((a,b) => b.length - a.length);
    keys.forEach(k => {
      if (result.includes(k)) result = result.split(k).join(allMap[k]);
    });
    return result;
  }

  async function renderItem(item) {
    if (!item) return;
    const _isEn = !!(window.CodiBankI18n && CodiBankI18n.isEn());

    const catMeta = CodiBank.getCategoryMetaByKey(item.categoryKey, item.userEmail);
    const _catNameEl = document.getElementById('categoryName'); if(_catNameEl) _catNameEl.textContent = catMeta?.label || (_isEn?'Category':'카테고리');
    var _catMeta = window.CodiBank ? CodiBank.getCategoryMetaByKey(item.categoryKey||item.category, user?.email) : null;
    document.getElementById('itemTitle').textContent = (_catMeta?.label||(_isEn?'Item':'아이템')) + (item.brand ? ' \u00b7 '+item.brand : '');
    document.getElementById('itemBrandTag').style.display = 'none';
    const _rawColor = item.color || '';
    document.getElementById('itemColorTag').textContent = _rawColor
      ? (_isEn ? (_colorEN[_rawColor] || _translateNote(_rawColor)) : _rawColor)
      : (_isEn ? 'Color TBD' : '컬러 미정');
    function dedupeNote(t) {
      if (!t) return t;
      const seen = new Set();
      return t.trim().split(/\s+/).filter(w => {
        const k = w.toLowerCase();
        return seen.has(k) ? false : (seen.add(k), true);
      }).join(' ');
    }
    const _rawNote = (item.note && String(item.note).trim())
      ? dedupeNote(String(item.note).trim())
      : (_isEn ? 'No description yet. Add features in "Edit".' : '아이템 설명이 아직 없습니다. “수정”에서 특징을 추가해보세요.');
    document.getElementById('itemNote').textContent = _isEn ? _translateNote(_rawNote) : _rawNote;

    // Images — 메인 이미지 직접 로드
    const main = document.getElementById('mainImage');
    const imgs = [
      { ref: item.images?.front, label: '전면' },
      { ref: item.images?.back, label: '후면' },
      { ref: item.images?.brand, label: '브랜드·기타' },
    ].filter((x) => !!x.ref);

    if (!imgs.length) {
      main.alt = '이미지 없음';
      return;
    }

    // 첫 번째 이미지를 메인으로 로드
    try {
      const src = await CodiBank.getImageSrc(imgs[0].ref);
      if (src) { main.src = src; main.style.opacity = '1'; }
    } catch(e) { console.warn('img load err', e); }

    // 분석 내용 표시
    var _anSec = document.getElementById('analysisSection');
    var _anTxt = document.getElementById('analysisText');
    if(_anSec && _anTxt){
      var _note = item.note || '';
      if(_note && _note.length > 10){
        _anTxt.textContent = _isEn ? _translateNote(_note) : _note;
        _anSec.style.display = 'block';
      }
    }
  }

  // ─────────────────────────────────────────
  // Edit Modal
  // ─────────────────────────────────────────
  const editModal = document.getElementById('editModal');
  const editBtn = document.getElementById('editBtn');
  const deleteBtn = document.getElementById('deleteBtn');

  const editClose = document.getElementById('editClose');
  const editCancel = document.getElementById('editCancel');
  const editSave = document.getElementById('editSave');

  const editCategory = document.getElementById('editCategory');
  const editBrand = document.getElementById('editBrand');
  const editColor = document.getElementById('editColor');
  const editNote = document.getElementById('editNote');

  function openEditModal() {
    if (!editModal || !currentItem) return;

    // categories
    const cats = CodiBank.getCategoriesForUser(user.email) || [];
    editCategory.innerHTML = cats
      .map((c) => `<option value="${String(c.key)}">${String(c.label)}</option>`)
      .join('');

    editCategory.value = String(currentItem.categoryKey || 'etc');
    editBrand.value = String(currentItem.brand || '');
    editColor.value = String(currentItem.color || '');
    if (editNote) editNote.value = String(currentItem.note || '');

    editModal.classList.remove('hidden');
    editModal.classList.add('flex');
  }

  function closeEditModal() {
    if (!editModal) return;
    editModal.classList.add('hidden');
    editModal.classList.remove('flex');
  }

  editBtn?.addEventListener('click', openEditModal);
  editClose?.addEventListener('click', closeEditModal);
  editCancel?.addEventListener('click', closeEditModal);

  editSave?.addEventListener('click', () => {
    if (!currentItem) return;

    const patch = {
      categoryKey: String(editCategory.value || currentItem.categoryKey || 'etc'),
      brand: String(editBrand.value || '').trim(),
      color: String(editColor.value || '').trim(),
      note: String(editNote?.value || '').trim(),
    };

    const res = CodiBank.updateItem(user.email, currentItem.id, patch);
    if (!res || res.ok !== true) {
      alert((res && res.error) ? res.error : CodiBankI18n.t('저장에 실패했습니다.','Save failed.'));
      if (String(res?.error || '').includes('한도')) window.location.href = 'pricing.html';
      return;
    }

    currentItem = res.item;
    renderItem(currentItem);
    closeEditModal();
  });

  deleteBtn?.addEventListener('click', () => {
    if (!currentItem) return;
    if (!confirm(CodiBankI18n.t('이 아이템을 삭제할까요?','Delete this item?'))) return;

    const res = CodiBank.deleteItem(user.email, currentItem.id);
    if (!res || res.ok !== true) {
      alert((res && res.error) ? res.error : CodiBankI18n.t('삭제에 실패했습니다.','Delete failed.'));
      return;
    }
    alert(CodiBankI18n.t('삭제되었습니다.','Deleted.'));
    window.location.href = 'aicloset.html';
  });

  // ─────────────────────────────────────────
  // Share / Sell quick actions
  // ─────────────────────────────────────────
  async function shareCurrentImage() {
    const main = document.getElementById('mainImage');
    const src = main?.getAttribute('src') || '';
    if (!src) return alert(CodiBankI18n.t('공유할 이미지가 없습니다.','No image to share.'));

    try {
      const blob = await fetch(src).then((r) => r.blob());
      const file = new File([blob], 'codibank_item.png', { type: blob.type || 'image/png' });

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ title: '코디뱅크 아이템', files: [file] });
        return;
      }

      // fallback: download
      const a = document.createElement('a');
      a.download = 'codibank_item.png';
      a.href = URL.createObjectURL(blob);
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 3000);
    } catch (e) {
      console.warn('share failed', e);
      alert(CodiBankI18n.t('공유/저장에 실패했습니다.','Share/save failed.'));
    }
  }

  // 공유/영상 버튼 제거됨

  // Init
  (function init() {
    if (!id) {
      alert(CodiBankI18n.t('아이템 ID가 없습니다.','Item ID not found.'));
      window.location.href = 'aicloset.html';
      return;
    }

    currentItem = CodiBank.getItemById(id);
    if (!currentItem) {
      alert(CodiBankI18n.t('아이템을 찾을 수 없습니다.','Item not found.'));
      window.location.href = 'aicloset.html';
      return;
    }

    // 권한 체크(내 아이템만 수정 가능)
    if (String(currentItem.userEmail || '') !== String(user.email || '')) {
      console.warn('권한 없음: 다른 사용자의 아이템');
    }

    renderItem(currentItem);
  })();
</script>
