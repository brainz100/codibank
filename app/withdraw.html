<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>회원탈퇴 - 코디뱅크</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZWQ7K7H0V"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'G-2ZWQ7K7H0V');

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100dvh;background:#ffffff;color:#111827;font-family:'Noto Sans KR',sans-serif;}
.page{max-width:480px;margin:0 auto;padding:0 0 80px;}
.hdr{display:flex;align-items:center;gap:12px;padding:16px 20px 14px;border-bottom:1px solid #f0f0f0;}
.back-btn{width:36px;height:36px;border-radius:50%;background:#f5f5f5;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;}
.hdr-title{font-size:17px;font-weight:800;color:#111827;}
.section{padding:24px 20px;}
.warn-box{background:#fff5f5;border:1.5px solid #fecaca;border-radius:14px;padding:16px;margin-bottom:24px;display:flex;gap:12px;align-items:flex-start;}
.warn-icon{font-family:'Material Symbols Outlined';font-size:22px;color:#ef4444;flex-shrink:0;margin-top:1px;}
.warn-text{font-size:13px;color:#7f1d1d;line-height:1.7;}
.warn-text b{font-weight:800;}
.reason-title{font-size:14px;font-weight:800;color:#111827;margin-bottom:12px;}
.reason-list{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
.reason-item{display:flex;align-items:center;gap:10px;padding:14px 16px;border:1.5px solid #e5e7eb;border-radius:12px;cursor:pointer;transition:all .15s;}
.reason-item:has(input:checked){border-color:#35A29F;background:#f0faf9;}
.reason-item input[type="checkbox"]{width:18px;height:18px;accent-color:#35A29F;cursor:pointer;flex-shrink:0;}
.reason-item label{font-size:13px;color:#374151;cursor:pointer;flex:1;}
.other-input{width:100%;margin-top:8px;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:13px;font-family:inherit;outline:none;display:none;}
.other-input:focus{border-color:#35A29F;}
.confirm-section{padding:0 20px;}
.confirm-check{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;margin-bottom:20px;cursor:pointer;}
.confirm-check input{width:18px;height:18px;accent-color:#ef4444;flex-shrink:0;margin-top:1px;}
.confirm-check label{font-size:13px;color:#7f1d1d;line-height:1.6;cursor:pointer;}
.btn-withdraw{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,#35A29F,#0B666A);color:#fff;transition:opacity .15s;}
.btn-withdraw:disabled{opacity:.4;cursor:not-allowed;}
.btn-withdraw:not(:disabled):active{opacity:.85;}
.btn-cancel{width:100%;padding:14px;border:1.5px solid #e5e7eb;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:#fff;color:#6b7280;margin-top:10px;transition:background .15s;}
.btn-cancel:active{background:#f5f5f5;}
.mi{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}
</style>
<script src="config.js"></script>
<script src="codibank.js"></script>
<script src="i18n.js"></script>
</head>
<body>
<div class="page">
  <header class="hdr">
    <button class="back-btn" onclick="history.back()">
      <span class="mi" style="font-size:20px;">arrow_back_ios_new</span>
    </button>
    <span class="hdr-title">회원탈퇴</span>
  </header>

  <div class="section">
    <!-- 경고 박스 -->
    <div class="warn-box">
      <span class="warn-icon">warning</span>
      <div class="warn-text">
        탈퇴 시 모든 데이터가 <b>즉시 삭제</b>되며 복구할 수 없습니다.<br>
        저장된 코디 이미지, 등록 아이템, 구독 내역이 모두 사라집니다.
      </div>
    </div>

    <!-- 탈퇴 이유 -->
    <div class="reason-title">탈퇴 이유를 알려주세요 (복수 선택 가능)</div>
    <div class="reason-list" id="reasonList">
      <div class="reason-item">
        <input type="checkbox" id="r1" value="서비스 만족도 부족">
        <label for="r1">서비스가 기대에 미치지 못해요</label>
      </div>
      <div class="reason-item">
        <input type="checkbox" id="r2" value="이미지 품질 불만족">
        <label for="r2">AI 이미지 품질이 아쉬워요</label>
      </div>
      <div class="reason-item">
        <input type="checkbox" id="r3" value="사용 빈도 낮음">
        <label for="r3">자주 사용하지 않게 됐어요</label>
      </div>
      <div class="reason-item">
        <input type="checkbox" id="r4" value="개인정보 우려">
        <label for="r4">개인정보 보호가 걱정돼요</label>
      </div>
      <div class="reason-item">
        <input type="checkbox" id="r5" value="비용 부담">
        <label for="r5">요금이 부담돼요</label>
      </div>
      <div class="reason-item">
        <input type="checkbox" id="r6" value="기타" onchange="toggleOther(this)">
        <label for="r6">기타</label>
      </div>
      <input type="text" id="otherText" class="other-input" placeholder="탈퇴 이유를 입력해주세요" maxlength="100">
    </div>
  </div>

  <div class="confirm-section">
    <div class="confirm-check">
      <input type="checkbox" id="confirmCheck" onchange="updateBtn()">
      <label for="confirmCheck">위 내용을 확인했으며, 탈퇴 후 모든 데이터가 삭제됨에 동의합니다.</label>
    </div>
    <button class="btn-withdraw" id="btnWithdraw" disabled onclick="doWithdraw()">회원탈퇴</button>
    <button class="btn-cancel" onclick="history.back()">취소</button>
  </div>
</div>

<script>
function toggleOther(cb){
  document.getElementById('otherText').style.display = cb.checked ? 'block' : 'none';
}
function updateBtn(){
  const ok = document.getElementById('confirmCheck').checked;
  document.getElementById('btnWithdraw').disabled = !ok;
}
async function doWithdraw(){
  const user = window.CodiBank && CodiBank.getCurrentUser ? CodiBank.getCurrentUser() : null;
  if(!user || !user.email){ alert('로그인이 필요합니다.'); location.href='login.html'; return; }

  // 탈퇴 이유 수집
  const reasons = [];
  document.querySelectorAll('#reasonList input[type=checkbox]:checked').forEach(cb => {
    if(cb.value === '기타'){
      const txt = document.getElementById('otherText').value.trim();
      if(txt) reasons.push('기타: '+txt);
    } else { reasons.push(cb.value); }
  });

  if(!confirm('정말로 탈퇴하시겠습니까?\n\n모든 데이터가 즉시 삭제되며 복구할 수 없습니다.')) return;

  const btn = document.getElementById('btnWithdraw');
  btn.disabled = true;
  btn.textContent = '처리 중…';

  try{
    // 탈퇴 API 호출
    const bb = (window.CODIBANK_CONFIG && window.CODIBANK_CONFIG.backendBase) || 'https://codibank-api.onrender.com';
    const r = await fetch(bb+'/api/user/withdraw', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: user.email, reasons })
    });
    const d = await r.json().catch(()=>({ok:false}));

    if(d.ok || r.status === 200 || r.status === 404){
      // 로컬 데이터 전체 삭제
      try{
        localStorage.clear();
        sessionStorage.clear();
        if(window.CodiBank && CodiBank.logout) await CodiBank.logout();
      }catch(_){}
      alert('회원탈퇴가 완료됐습니다.\n코디뱅크를 이용해 주셔서 감사합니다.');
      location.replace('login.html');
    } else {
      // API 없어도 클라이언트 탈퇴 처리
      try{ localStorage.clear(); sessionStorage.clear(); }catch(_){}
      if(window.CodiBank && CodiBank.logout) try{ await CodiBank.logout(); }catch(_){}
      alert('회원탈퇴가 완료됐습니다.\n코디뱅크를 이용해 주셔서 감사합니다.');
      location.replace('login.html');
    }
  }catch(e){
    // 네트워크 오류여도 클라이언트 탈퇴 처리
    try{ localStorage.clear(); sessionStorage.clear(); }catch(_){}
    try{ if(window.CodiBank && CodiBank.logout) await CodiBank.logout(); }catch(_){}
    alert('회원탈퇴가 완료됐습니다.');
    location.replace('login.html');
  }
}
</script>

<script>
// ── 회원탈퇴 페이지 i18n ──
(function(){
  var EN = {
    title:        'Account Deletion',
    warnText:     '<b>All data will be immediately deleted</b> and cannot be recovered.<br>Saved outfits, registered items, and subscription history will all be erased.',
    reasonTitle:  'Please tell us why you are leaving (multiple choices allowed)',
    r1: 'The service did not meet my expectations',
    r2: 'AI image quality was unsatisfactory',
    r3: 'I I no longer use it often',
    r4: 'I have concerns about personal data privacy',
    r5: 'The pricing is a burden',
    r6: 'Other',
    otherPlaceholder: 'Please describe your reason',
    confirmText:  "I have read and agree that all my data will be permanently deleted upon withdrawal.",
    btnWithdraw:  "Delete Account",
    btnCancel:    "Cancel",
    alertConfirm: "Are you sure? All data will be permanently deleted.",
    alertDone:    "Account deleted. Thank you for using CodiBank.",
    alertLogin:   "Please log in first.",
    alertProcessing: "Processing…",
  };

  function applyEn(){
    if(!(window.CodiBankI18n && CodiBankI18n.isEn())) return;
    document.documentElement.setAttribute('lang','en');
    document.title = 'Account Deletion - CodiBank';
    var q = function(id){ return document.getElementById(id); };
    var qs = function(sel){ return document.querySelector(sel); };

    // 헤더 타이틀
    var hdrTitle = qs('.hdr-title');
    if(hdrTitle) hdrTitle.textContent = EN.title;

    // 경고 박스 텍스트
    var warnText = qs('.warn-text');
    if(warnText) warnText.innerHTML = EN.warnText;

    // 탈퇴 이유 타이틀
    var reasonTitle = qs('.reason-title');
    if(reasonTitle) reasonTitle.textContent = EN.reasonTitle;

    // 체크박스 라벨
    var labels = { r1:EN.r1, r2:EN.r2, r3:EN.r3, r4:EN.r4, r5:EN.r5, r6:EN.r6 };
    Object.keys(labels).forEach(function(id){
      var label = document.querySelector('label[for="'+id+'"]');
      if(label) label.textContent = labels[id];
    });

    // 기타 placeholder
    var otherInput = q('otherText');
    if(otherInput) otherInput.placeholder = EN.otherPlaceholder;

    // 최종 동의 라벨
    var confirmLabel = qs('.confirm-check label');
    if(confirmLabel) confirmLabel.textContent = EN.confirmText;

    // 탈퇴 버튼
    var btnW = q('btnWithdraw');
    if(btnW && !btnW.disabled) btnW.textContent = EN.btnWithdraw;

    // 취소 버튼
    var btnC = qs('.btn-cancel');
    if(btnC) btnC.textContent = EN.btnCancel;
  }

  // 로드 시 적용
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(applyEn, 150); });
  } else {
    setTimeout(applyEn, 150);
  }

  // 언어 전환 감지
  var _ll = localStorage.getItem('cb_lang') || 'ko';
  setInterval(function(){
    var cur = localStorage.getItem('cb_lang') || 'ko';
    if(cur !== _ll){ _ll = cur; applyEn(); }
  }, 500);
})();
</script>

</body>
</html>
