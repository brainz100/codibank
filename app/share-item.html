  <script>

        extend: {
          colors: {

            accent: "#C5A358",
            "background-light": "#FFFFFF",
            "background-muted": "#F9FAFB",
          },
          fontFamily: {
            display: ["Outfit", "sans-serif"],

            <span class="material-symbols-outlined text-[24px]">share</span>
          </button>
          <button class="w-12 h-12 rounded-full bg-white/90 ios-blur flex items-center justify-center text-accent shadow-xl active:scale-95 transition-transform" title="판매">
            <span class="material-symbols-outlined text-[24px]">sell</span>

          <div class="flex justify-between items-baseline border-b border-slate-100 pb-2">

        <a href="camera.html" class="flex flex-col items-center gap-1 text-slate-500"><span class="material-symbols-outlined text-2xl">add_a_photo</span><span class="text-[10px] font-extrabold">item등록</span></a>

<div class="fixed bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-300 rounded-full z-[60]"></div>
