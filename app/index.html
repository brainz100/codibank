<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>코디뱅크 - AI 패션 코디네이터</title>

  <!-- ⚡ 최우선 실행: 로그인 상태면 즉시 내옷장으로 이동 -->
  <style>html{visibility:hidden}</style>
  <script>
  (function(){
    try {
      var raw = localStorage.getItem('codibank_session');
      if (raw) {
        window.location.replace('closet.html');
      } else {
        document.documentElement.style.visibility = 'visible';
      }
    } catch(e) {
      document.documentElement.style.visibility = 'visible';
    }
  })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="codibank.js"></script>
  <script>tailwind.config={theme:{extend:{colors:{accent:"#C5A358"},fontFamily:{display:["Outfit","Noto Sans KR","sans-serif"]}}}};</script>

  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{
      font-family:'Outfit','Noto Sans KR',sans-serif;
      background:#111217;
      color:#fff;
      min-height:100dvh;
      overflow-x:hidden;
    }
    .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;}
    .material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 650,'GRAD' 0,'opsz' 24;}

    /* 배경 */
    .page-bg{
      min-height:100dvh;
      background:
        radial-gradient(ellipse 90% 55% at 15% 8%, rgba(197,163,88,0.16) 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 85% 85%, rgba(197,163,88,0.09) 0%, transparent 55%),
        #111217;
    }

    /* 골드 그라디언트 텍스트 */
    .gold-text{
      background:linear-gradient(135deg,#C5A358 0%,#e8ca78 45%,#C5A358 75%,#9a7a3a 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* 피처 카드 */
    .feature-card{
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.09);
      border-radius:18px;
      padding:18px 20px;
    }
    .feature-icon{
      width:44px;height:44px;
      border-radius:14px;
      background:rgba(197,163,88,0.14);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;
    }

    /* CTA 버튼 */
    .btn-gold{
      width:100%;padding:17px 0;
      background:linear-gradient(135deg,#C5A358,#d4b368);
      color:#1a1000;font-weight:800;font-size:15px;
      border:none;border-radius:16px;
      box-shadow:0 8px 30px rgba(197,163,88,0.30);
      display:flex;align-items:center;justify-content:center;gap:8px;
      cursor:pointer;text-decoration:none;
      transition:transform 160ms ease,box-shadow 160ms ease;
    }
    .btn-gold:active{transform:scale(0.97);box-shadow:0 4px 14px rgba(197,163,88,0.22);}

    .btn-dark{
      width:100%;padding:16px 0;
      background:rgba(255,255,255,0.06);
      border:1.5px solid rgba(255,255,255,0.13);
      color:rgba(255,255,255,0.82);font-weight:700;font-size:15px;
      border-radius:16px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;text-decoration:none;
      transition:transform 160ms ease,background 160ms ease;
    }
    .btn-dark:active{transform:scale(0.97);background:rgba(255,255,255,0.10);}

    /* 구분선 */
    .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(197,163,88,0.25),transparent);}

    /* 애니메이션 */
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .a1{animation:fadeUp 650ms cubic-bezier(0.16,1,0.3,1) 80ms both;}
    .a2{animation:fadeUp 650ms cubic-bezier(0.16,1,0.3,1) 180ms both;}
    .a3{animation:fadeUp 650ms cubic-bezier(0.16,1,0.3,1) 290ms both;}
    .a4{animation:fadeUp 650ms cubic-bezier(0.16,1,0.3,1) 390ms both;}
    .a5{animation:fadeUp 650ms cubic-bezier(0.16,1,0.3,1) 470ms both;}

    /* 스피너 */
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:30px;height:30px;border:2.5px solid rgba(197,163,88,0.2);border-top-color:#C5A358;border-radius:50%;animation:spin 0.8s linear infinite;}

    /* PC 레이아웃 */
    @media(min-width:640px){
      .landing-inner{max-width:420px;margin:0 auto;}
    }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="loadingScreen" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111217;">
    <div class="spinner"></div>
    <p style="margin-top:14px;font-size:11px;font-weight:700;letter-spacing:0.35em;color:rgba(197,163,88,0.55);text-transform:uppercase;font-family:Outfit,sans-serif;">CODIBANK</p>
  </div>

  <!-- 랜딩 페이지 -->
  <div id="landingPage" class="page-bg hidden" style="min-height:100dvh;display:flex;flex-direction:column;">
    <div class="landing-inner" style="flex:1;display:flex;flex-direction:column;padding:52px 24px 32px;">

      <!-- 히어로 텍스트 -->
      <div class="a1" style="margin-bottom:36px;">
        <h1 style="font-size:clamp(28px,8vw,38px);font-weight:900;line-height:1.22;letter-spacing:-0.02em;margin:0 0 14px;">
          AI가 매일<br/>
          <span class="gold-text">완벽한 코디</span>를<br/>
          제안해드려요
        </h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.50);line-height:1.7;font-weight:500;margin:0;">
          날씨·목적·체형을 분석해서<br/>당신만을 위한 스타일링을 추천합니다.
        </p>
      </div>

      <!-- 피처 카드 3개 -->
      <div class="a2" style="display:flex;flex-direction:column;gap:10px;margin-bottom:36px;">

        <div class="feature-card" style="display:flex;align-items:center;gap:16px;">
          <div class="feature-icon">
            <span class="material-symbols-outlined filled" style="color:#C5A358;font-size:22px;">psychology</span>
          </div>
          <div>
            <p style="font-size:13px;font-weight:800;color:#fff;margin:0 0 3px;">AI 코디 추천</p>
            <p style="font-size:11px;color:rgba(255,255,255,0.42);margin:0;">날씨·목적·체형 기반 맞춤 스타일링</p>
          </div>
        </div>

        <div class="feature-card" style="display:flex;align-items:center;gap:16px;">
          <div class="feature-icon">
            <span class="material-symbols-outlined filled" style="color:#C5A358;font-size:22px;">checkroom</span>
          </div>
          <div>
            <p style="font-size:13px;font-weight:800;color:#fff;margin:0 0 3px;">디지털 옷장</p>
            <p style="font-size:11px;color:rgba(255,255,255,0.42);margin:0;">내 옷을 카테고리별로 디지털화</p>
          </div>
        </div>

        <div class="feature-card" style="display:flex;align-items:center;gap:16px;">
          <div class="feature-icon">
            <span class="material-symbols-outlined filled" style="color:#C5A358;font-size:22px;">storefront</span>
          </div>
          <div>
            <p style="font-size:13px;font-weight:800;color:#fff;margin:0 0 3px;">공유 · 판매</p>
            <p style="font-size:11px;color:rgba(255,255,255,0.42);margin:0;">안 입는 옷을 빌려주고 포인트 적립</p>
          </div>
        </div>

      </div>

      <!-- 구분선 -->
      <div class="divider a3" style="margin-bottom:28px;"></div>

      <!-- CTA 버튼 -->
      <div class="a4" style="display:flex;flex-direction:column;gap:10px;">
        <a href="signup.html" class="btn-gold">
          <span class="material-symbols-outlined filled" style="font-size:18px;">person_add</span>
          무료로 시작하기
        </a>
        <a href="login.html" class="btn-dark">
          이미 계정이 있어요
        </a>
      </div>

      <!-- 하단 문구 -->
      <p class="a5" style="text-align:center;font-size:10px;color:rgba(255,255,255,0.22);margin-top:20px;line-height:1.7;">
        가입하면 <span style="color:rgba(197,163,88,0.55);">AI 스타일링 무료 체험</span> 제공<br/>
        신용카드 없이 바로 시작 가능
      </p>

    </div>
  </div>

  <script>
  (function(){
    function showLanding(){
      var loading = document.getElementById('loadingScreen');
      var landing = document.getElementById('landingPage');
      if(loading) loading.style.display = 'none';
      if(landing){ landing.classList.remove('hidden'); landing.style.display = 'flex'; }
    }

    function check(){
      try {
        if(window.CodiBank && typeof CodiBank.getCurrentUser === 'function'){
          var user = CodiBank.getCurrentUser();
          if(user && user.email){
            window.location.replace('closet.html');
            return;
          }
        }
      } catch(e){}
      showLanding();
    }

    if(document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', check);
    } else {
      check();
    }
  })();
  </script>

</body>
</html>
