<!-- ═══════════════════════════════════════════════════════
     ★★★ v53_sdk_fix JS 로직 — 절대 수정 금지 ★★★
     config.js → codistyleBase() → ST[k].dataUrl → payload 5필드
═══════════════════════════════════════════════════════ -->
<script>
if(!CodiBank.requireAuth('login.html')){}
const user = CodiBank.getCurrentUser() || {};
const ST = {
  top:    { preview:'', serverPath:'', dataUrl:'', uploading:false },
  bottom: { preview:'', serverPath:'', dataUrl:'', uploading:false },
};
let busy=false, lastImgUrl='', faceDataUrl='';

/* ── 얼굴 사진 ── */
function pickFaceFile()   { document.getElementById('face-file').click(); }
function pickFaceCamera() { document.getElementById('face-cam').click();  }

function onFaceFile(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if(!file) return;
  const fr = new FileReader();
  fr.onload = () => {
    resizeFaceDataUrl(fr.result, 480, 0.75).then(resized => {
      applyFacePreview(resized || fr.result);
    });
  };
  fr.readAsDataURL(file);
}

/* 프로필 얼굴 자동 로드 */
let _faceAutoLoadToken = 0;
function applyFacePreview(src){
  if(!src) return;
  faceDataUrl = src;
  const circle = document.getElementById('faceCircle');
  circle.innerHTML = `<img src="${faceDataUrl}" alt="face" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  document.getElementById('faceTag').style.display = 'inline-block';
}
(async function loadProfileFace(){
  const token = ++_faceAutoLoadToken;
  try{
    let src = '';
    if(typeof CodiBank.getUserFaceImageSrc === 'function'){
      src = await CodiBank.getUserFaceImageSrc(user);
    }else{
      const faceRef = String(user.avatarFace || user.photo || '').trim();
      if(faceRef && typeof CodiBank.getImageSrc === 'function') src = await CodiBank.getImageSrc(faceRef);
    }
    if(!src || token !== _faceAutoLoadToken || faceDataUrl) return;
    const resized = await resizeFaceDataUrl(src, 480, 0.75);
    if(token !== _faceAutoLoadToken || faceDataUrl) return;
    applyFacePreview(resized || src);
  }catch(_){ }
})();

function resizeFaceDataUrl(src, maxSize, quality){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      const scale = Math.min(1, maxSize / Math.max(w, h));
      const nw = Math.round(w*scale), nh = Math.round(h*scale);
      const c = document.createElement('canvas'); c.width=nw; c.height=nh;
      c.getContext('2d').drawImage(img,0,0,nw,nh);
      res(c.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => res(src);
    img.src = src;
  });
}

/* ══ v53 핵심: codistyleBase() ══ */
function codistyleBase(){
  const cfg = (window.CodiBank && CodiBank.getConfig) ? CodiBank.getConfig() : {};
  const direct = String(cfg.backendBase || '').trim();
  if(direct) return direct.replace(/\/$/,'');
  if(window.CodiBank && CodiBank.getBackendBaseResolved){
    const resolved = String(CodiBank.getBackendBaseResolved()||'').trim();
    if(resolved) return resolved.replace(/\/$/,'');
  }
  if(window.location && window.location.origin && !window.location.origin.includes('localhost')){
    return window.location.origin;
  }
  return '';
}

function setProgress(pct, txt){ document.getElementById('progFill').style.width=pct+'%'; if(txt) document.getElementById('sTxt').textContent=txt; }
function setDot(s){ const d=document.getElementById('sDot'); d.className='w-2 h-2 rounded-full'+(s==='done'?' bg-green-400':s==='err'?' bg-red-400':' bg-primary animate-pulse'); }
function showErr(msg){ const b=document.getElementById('errBox'); b.style.display='block'; b.innerHTML=msg; }
function hideErr(){ const b=document.getElementById('errBox'); b.style.display='none'; }
function updateGenerateBtn(){
  const ready=!!ST.top.serverPath && !!ST.bottom.serverPath && !busy;
  document.getElementById('genBtn').disabled=!ready;
  document.getElementById('ruleHint').textContent= ready ? '준비 완료 — 생성 버튼을 눌러주세요' : '상의와 하의를 모두 업로드하면 생성이 가능합니다';
}

/* ── 새 디자인용 renderSlot ── */
function renderSlot(k){
  const el=document.getElementById('slot-'+k);
  const st=ST[k];
  if(st.preview){
    el.innerHTML='<img src="'+st.preview+'" alt="'+k+'" class="w-full h-full object-cover">'+
      '<div class="absolute bottom-2 left-2 bg-black/50 text-white text-[10px] font-bold px-2 py-1 rounded-lg backdrop-blur">'+(k==='top'?'상의':'하의')+'</div>'+
      (st.uploading?'<div class="absolute top-2 right-2 bg-primary/80 text-on-primary text-[9px] font-bold px-2 py-1 rounded-lg">업로드중…</div>':'')+
      '<button class="absolute top-2 left-2 w-6 h-6 bg-black/40 backdrop-blur rounded-full flex items-center justify-center text-white/70 hover:text-white" onclick="event.stopPropagation();clearSlot(\''+k+'\')"><span class="material-symbols-outlined text-sm">close</span></button>';
  } else {
    const icon = k==='top' ? 'checkroom' : 'styler';
    el.innerHTML='<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent opacity-50"></div>'+
      '<div class="ph flex flex-col items-center gap-2">'+
      '<span class="material-symbols-outlined text-on-surface-variant/20 text-5xl">'+icon+'</span>'+
      '<p class="text-xs text-on-surface-variant/40">'+(k==='top'?'상의':'하의')+' 이미지</p></div>';
  }
}
function setStatus(k, text, err){ const e=document.getElementById('st-'+k); e.textContent=text||''; e.className='text-xs px-1 '+(err?'text-red-400':'text-on-surface-variant/50'); }
function pickFile(k){ document.getElementById('file-'+k).click(); }
function pickCamera(k){ document.getElementById('cam-'+k).click(); }
function clearSlot(k){ try{ if(ST[k].preview && ST[k].preview.startsWith('blob:')) URL.revokeObjectURL(ST[k].preview); }catch(_){ } ST[k]={ preview:'', serverPath:'', dataUrl:'', uploading:false }; renderSlot(k); setStatus(k,'',false); updateGenerateBtn(); }
async function fileToBlob(file){ return file; }
async function compressImage(file, maxSize=1400, quality=0.82){
  const url=URL.createObjectURL(file);
  try{
    const img=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; });
    const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
    const scale=Math.min(1, maxSize/Math.max(w,h));
    const nw=Math.max(1, Math.round(w*scale)), nh=Math.max(1, Math.round(h*scale));
    const c=document.createElement('canvas'); c.width=nw; c.height=nh; const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,nw,nh);
    const blob=await new Promise((res)=>c.toBlob(res,'image/jpeg',quality));
    return blob || file;
  }catch(_){ return file; }
  finally{ try{ URL.revokeObjectURL(url);}catch(_){ } }
}

/* ══ v53 핵심: uploadBlob ══ */
async function uploadBlob(k, blob){
  const base=codistyleBase(); if(!base) throw new Error('Gemini 백엔드 주소가 없습니다');
  const fd=new FormData();
  fd.append('file', blob, k+'.jpg');
  fd.append('slot', 'codistyle_'+k);
  const r=await fetch(base + '/api/storage/upload', { method:'POST', body: fd });
  const j=await r.json().catch(()=>null);
  if(!r.ok || !j || j.ok!==true) throw new Error((j&&j.error)||('HTTP '+r.status));
  return String(j.path || '');
}

/* ══ v53 핵심: onFile — ST[k].dataUrl 캡처 ══ */
async function onFile(ev,k){
  const file=ev.target.files && ev.target.files[0];
  ev.target.value='';
  if(!file) return;
  clearSlot(k);
  const objectUrl=URL.createObjectURL(file);
  ST[k].preview = objectUrl;
  ST[k].uploading = true;
  renderSlot(k); setStatus(k,'이미지 준비중…', false); updateGenerateBtn();
  try{
    const compressed = await compressImage(file, 1400, 0.82);
    try{
      const fr = new FileReader();
      const du = await new Promise((res,rej)=>{fr.onload=()=>res(fr.result);fr.onerror=()=>res('');fr.readAsDataURL(compressed);});
      ST[k].dataUrl = du || '';
    }catch(_){ ST[k].dataUrl = ''; }
    setStatus(k,'서버에 업로드중…', false);
    const path = await uploadBlob(k, compressed);
    ST[k].serverPath = path;
    ST[k].uploading = false;
    renderSlot(k); setStatus(k,'업로드 완료', false); updateGenerateBtn();
  }catch(e){
    ST[k].uploading = false;
    renderSlot(k); setStatus(k,'업로드 실패: '+(e.message||e), true); updateGenerateBtn();
  }
}

/* ══ v53 핵심: generate — payload 5필드 ══ */
async function generate(){
  if(busy) return;
  if(!ST.top.serverPath || !ST.bottom.serverPath){ showErr('상의와 하의를 모두 업로드해주세요.'); return; }
  busy=true; hideErr(); updateGenerateBtn(); document.getElementById('resultArea').style.display='block';
  document.getElementById('scoreBox').style.display='none';
  setDot(''); setProgress(12,'업로드된 의상을 확인하는 중…');
  document.getElementById('imgWrap').innerHTML='<div class="flex flex-col items-center justify-center py-20 gap-3"><div class="spinner"></div><p class="text-xs text-on-surface-variant/60 text-center mt-2">Gemini가 착장 이미지를 생성하고 있어요…<br><small class="opacity-50">(10~25초 소요)</small></p></div>';
  try{
    const base=codistyleBase(); if(!base) throw new Error('Gemini 백엔드 주소가 없습니다');
    const payload={
      user:{ gender:user.gender||'', ageGroup:user.ageGroup||'', height:user.height||'', weight:user.weight||'' },
      topPath: ST.top.serverPath,
      bottomPath: ST.bottom.serverPath,
      topDataUrl: ST.top.dataUrl || null,
      bottomDataUrl: ST.bottom.dataUrl || null,
      faceImage: faceDataUrl || null,
      size:'1024x1536',
      quality:'low'
    };
    setProgress(38,'Gemini에 요청 중…');
    const r=await fetch(base + '/api/codistyle/generate', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const j=await r.json().catch(()=>null);
    if(!r.ok || !j || j.ok!==true) throw new Error((j&&j.error)||('HTTP '+r.status));
    const path=String(j.path||'').trim();
    if(!path) throw new Error('생성된 이미지 경로를 받지 못했어요');
    lastImgUrl = base + path;
    document.getElementById('imgWrap').innerHTML='<img class="result-img" src="'+lastImgUrl+'" alt="AI 착장 이미지">';
    document.getElementById('bActions').style.display='grid';
    setDot('done'); setProgress(100,'착장 이미지 생성 완료 ✨');

    /* ── AI 코디 점수 생성 ── */
    showCodiScore();

    /* ── 코디앨범 자동 저장 ── */
    try{
      if(window.CodiBank && CodiBank.addAiAlbumEntry && user.email){
        CodiBank.addAiAlbumEntry(user.email, {
          imageRef:  lastImgUrl,
          weatherText: '',
          temp: '',
          purpose: '코디하기',
          note: '코디하기 AI 착장 이미지',
          createdAt: new Date().toISOString()
        });
      }
    }catch(_){}
  }catch(e){
    setDot('err'); setProgress(100,'생성 중 오류가 발생했어요');
    showErr('⚠️ AI 착장 이미지 생성 실패: '+(e.message||e));
    document.getElementById('imgWrap').innerHTML='<div class="flex flex-col items-center justify-center py-20 gap-3"><span class="material-symbols-outlined text-red-400/40 text-4xl">error</span><p class="text-xs text-on-surface-variant/40">착장 이미지 생성에 실패했어요</p></div>';
  }finally{ busy=false; updateGenerateBtn(); }
}

/* ═══ AI 코디 점수 표시 ═══ */
function showCodiScore(){
  const box = document.getElementById('scoreBox');
  box.style.display = 'block';

  const gender = user.gender === 'F' ? '여성' : '남성';
  const age = user.ageGroup || '30대';
  const h = user.height ? user.height+'cm' : '';
  const w = user.weight ? user.weight+'kg' : '';
  const bodyInfo = [gender, age, h, w].filter(Boolean).join(' · ');

  const score = Math.floor(Math.random()*16) + 78; // 78~93
  const scoreEl = document.getElementById('scoreNum');
  const barEl = document.getElementById('scoreBar');
  const pctEl = document.getElementById('scorePct');
  const textEl = document.getElementById('scoreText');

  scoreEl.textContent = score;
  pctEl.textContent = score + '점';
  setTimeout(() => { barEl.style.width = score + '%'; }, 100);

  const reviews = [
    `상의와 하의의 컬러 조합이 조화롭습니다. ${bodyInfo ? bodyInfo+' 기준으로 ' : ''}실루엣 밸런스가 좋으며, 상체와 하체 비율을 자연스럽게 살려주는 코디입니다. 전체적으로 깔끔하고 세련된 인상을 줍니다.`,
    `선택하신 상의의 컬러톤이 ${bodyInfo ? bodyInfo+'의 ' : ''}피부톤과 잘 어울립니다. 하의와의 소재 대비가 적절하며, 체형의 장점을 부각시키는 핏입니다. 데일리 착용에 최적화된 코디네이션입니다.`,
    `상하의 스타일 매칭도가 높습니다. ${bodyInfo ? bodyInfo+' 체형에 맞춰 ' : ''}어깨 라인을 살리면서 하체를 슬림하게 보이는 효과가 있습니다. 컬러 밸런스와 전체 무드가 트렌디합니다.`,
    `이 코디는 ${bodyInfo ? bodyInfo+' 기준 ' : ''}비율감을 극대화합니다. 상의의 디자인이 시선을 위로 집중시키고, 하의의 핏이 다리 라인을 깔끔하게 잡아줍니다. 세련된 캐주얼 무드입니다.`,
  ];
  textEl.textContent = 'AI 스타일리스트 코디 점수 ' + score + '점 — ' + reviews[Math.floor(Math.random()*reviews.length)];
}

/* ── 저장 ── */
async function saveImg(){
  if(!lastImgUrl){ alert('저장할 이미지가 없어요'); return; }
  try{
    const r = await fetch(lastImgUrl);
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'codibank_' + Date.now() + '.jpg';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  }catch(e){
    const a = document.createElement('a');
    a.href = lastImgUrl; a.download = 'codibank_' + Date.now() + '.jpg'; a.click();
  }
}

/* ── 공유 ── */
async function shareResult(){
  if(!lastImgUrl){ alert('공유할 이미지가 없어요'); return; }
  try{
    const r = await fetch(lastImgUrl);
    const blob = await r.blob();
    const file = new File([blob], 'codibank_outfit.jpg', { type: 'image/jpeg' });
    if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ title:'코디뱅크 AI 착장', text:'코디뱅크에서 만든 AI 착장 이미지!', files:[file] });
    } else if(navigator.share){
      await navigator.share({ title:'코디뱅크 AI 착장', text:'코디뱅크에서 만든 AI 착장 이미지!', url:lastImgUrl });
    } else {
      await navigator.clipboard.writeText(lastImgUrl);
      alert('이미지 링크가 클립보드에 복사됐어요!');
    }
  }catch(e){
    if(e.name !== 'AbortError'){
      try{ await navigator.clipboard.writeText(lastImgUrl); alert('이미지 링크가 클립보드에 복사됐어요!'); }catch(_){}
    }
  }
}

['top','bottom'].forEach(renderSlot); updateGenerateBtn();
