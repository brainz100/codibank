<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CodiBank - 오프라인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100dvh;background:#07132a;color:#d8e2ff;font-family:'Inter','Noto Sans KR',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;}
.icon{font-size:64px;margin-bottom:24px;opacity:.3;}
h1{font-size:22px;font-weight:800;margin-bottom:12px;color:rgba(216,226,255,.9);}
p{font-size:14px;color:rgba(216,226,255,.45);line-height:1.6;margin-bottom:24px;}
button{padding:14px 32px;border-radius:9999px;background:linear-gradient(135deg,#4cdbce,#13bbaf);color:#003733;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="icon">📡</div>
<h1>인터넷에 연결할 수 없어요</h1>
<p>네트워크 연결을 확인하고 다시 시도해주세요.<br/>Wi-Fi 또는 모바일 데이터를 켜주세요.</p>
<button onclick="location.reload()">다시 시도</button>
<script src="i18n.js"></script>
</body>
</html>
