<style>
body{font-family:'Outfit','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;background:#071952;color:#fff;min-height:100dvh;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 500,'GRAD' 0,'opsz' 24;}
.material-symbols-outlined.filled{font-variation-settings:'FILL' 1,'wght' 650,'GRAD' 0,'opsz' 24;}
.no-scrollbar::-webkit-scrollbar{display:none;}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none;}
    .closet-container{position:relative;height:400px;display:flex;align-items:center;justify-content:center;perspective:1300px;touch-action:pan-y;}
    .clothing-layer{position:absolute;width:160px;height:264px;border-radius:1.55rem;overflow:hidden;background:#fff;border:1px solid rgba(17,17,17,0.06);box-shadow:0 14px 34px rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;text-decoration:none;user-select:none;-webkit-user-select:none;will-change:transform,opacity,filter;transform-origin:50% 62%;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform-style:preserve-3d;transition:transform 520ms cubic-bezier(0.16,1,0.3,1),opacity 320ms cubic-bezier(0.2,0.8,0.2,1),filter 320ms cubic-bezier(0.2,0.8,0.2,1),box-shadow 520ms cubic-bezier(0.16,1,0.3,1),border-color 420ms ease;}
    .clothing-layer::before{content:'';position:absolute;inset:-40% -60%;pointer-events:none;opacity:0;transform:translateX(-120%) rotate(12deg);background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,0.75) 45%,transparent 60%);}
    @keyframes cardShine{0%{transform:translateX(-120%) rotate(12deg);opacity:0}15%{opacity:0.5}100%{transform:translateX(140%) rotate(12deg);opacity:0}}
    .clothing-layer.sparkle{border-color:rgba(197,163,88,0.8);box-shadow:0 26px 62px -22px rgba(197,163,88,0.35),0 18px 36px rgba(0,0,0,0.12);}
    .clothing-layer.sparkle::before{opacity:1;animation:cardShine 980ms cubic-bezier(0.16,1,0.3,1) 2;}
    .layer-1{transform:translateX(-148px) scale(0.88) translateZ(-90px) rotateY(10deg);z-index:10;opacity:0.54;filter:blur(0.85px);}
    .layer-5{transform:translateX(148px) scale(0.88) translateZ(-90px) rotateY(-10deg);z-index:10;opacity:0.54;filter:blur(0.85px);}
    .layer-2{transform:translateX(-86px) scale(1.08) translateZ(-45px) rotateY(6deg);z-index:20;opacity:0.94;}
    .layer-4{transform:translateX(86px) scale(1.08) translateZ(-45px) rotateY(-6deg);z-index:20;opacity:0.94;}
    .layer-3{transform:translateX(0) scale(1.35) translateZ(70px) rotateY(0deg);z-index:30;box-shadow:0 32px 70px -22px rgba(0,0,0,0.40);border-color:rgba(197,163,88,0.55);}
    .deck-highlight .layer-3{border:2px solid rgba(197,163,88,0.9);}
    .closet-container.is-shifting .clothing-layer:not(.layer-3){filter:blur(1.15px);}
    .clothing-layer.exit-left{pointer-events:none;transition:transform 200ms cubic-bezier(0.4,0,1,1),opacity 180ms ease;opacity:0;filter:blur(2.6px);transform:translateX(-210px) scale(0.52) translateZ(-140px) rotateY(16deg) rotate(-6deg);}
    .clothing-layer.exit-right{pointer-events:none;transition:transform 200ms cubic-bezier(0.4,0,1,1),opacity 180ms ease;opacity:0;filter:blur(2.6px);transform:translateX(210px) scale(0.52) translateZ(-140px) rotateY(-16deg) rotate(6deg);}
    .clothing-layer.enter-from-right{transform:translateX(210px) scale(0.52) translateZ(-140px) rotateY(-16deg) rotate(6deg);opacity:0;filter:blur(2.6px);}
    .clothing-layer.enter-from-left{transform:translateX(-210px) scale(0.52) translateZ(-140px) rotateY(16deg) rotate(-6deg);opacity:0;filter:blur(2.6px);}
    @keyframes centerPop{0%{transform:translateX(0) scale(1.35) translateZ(70px) rotateY(0deg)}55%{transform:translateX(0) scale(1.40) translateZ(110px) rotateY(0deg)}100%{transform:translateX(0) scale(1.35) translateZ(70px) rotateY(0deg)}}
    .center-pop{animation:centerPop 520ms cubic-bezier(0.16,1,0.3,1) 1;}
    .no-transition{transition:none !important;}
    .layer-img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;background:#fff;}
    .layer-ph{font-size:12px;color:rgba(15,23,42,0.55);font-weight:700;text-align:center;padding:0 10px;}
    .layer-icon{font-size:44px;color:rgba(15,23,42,0.22);}
    @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(197,163,88,0.35)}70%{box-shadow:0 0 0 18px rgba(197,163,88,0)}100%{box-shadow:0 0 0 0 rgba(197,163,88,0)}}
    .pulse-ring{animation:pulseRing 1.4s ease-out 1;border-radius:2rem;}

    /* === 코디 목적 그리드 === */
    .purpose-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .purpose-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 6px;border-radius:14px;border:1.5px solid rgba(15,23,42,0.08);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.04);font-size:11px;font-weight:800;color:rgba(15,23,42,0.68);cursor:pointer;transition:all 180ms ease;-webkit-tap-highlight-color:transparent;user-select:none;}
    .purpose-card .material-symbols-outlined{font-size:22px;transition:color 180ms ease;}
    .purpose-card:active{transform:scale(0.96);}
    .purpose-card.active{background:rgba(18,148,144,0.3);border-color:#70dbd4;color:#a2fdf0;box-shadow:0 8px 24px rgba(18,148,144,0.35);}
    .purpose-card.active .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 600,'GRAD' 0,'opsz' 24;color:#a2fdf0 !important;}
    /* ── 모바일옷장 다크 디자인 (m_closet_0308) ── */
    /* 카드 배경: 다크 네이비 */
    .clothing-layer { background: #0d1f3c !important; border-color: rgba(112,219,212,0.15) !important; }
    /* 카드 placeholder 텍스트 */
    .layer-ph { color: rgba(255,255,255,0.35) !important; }
    .layer-icon { color: rgba(151,254,237,0.22) !important; }
    /* 센터카드(layer-3): teal 테두리 */
    .layer-3 { border: 2px solid #70dbd4 !important; box-shadow: 0 0 20px rgba(112,219,212,0.35), 0 32px 70px -22px rgba(0,0,0,0.55) !important; }
    /* sparkle: teal 강조 */
    .clothing-layer.sparkle { border-color: #a2fdf0 !important; box-shadow: 0 0 28px rgba(162,253,240,0.55), 0 18px 36px rgba(0,0,0,0.40) !important; }
    /* MATCH 배지: 우상단 이동, teal 배경 */
    .match-score-badge { top: 7px !important; right: 7px !important; bottom: auto !important; background: #a2fdf0 !important; color: #071952 !important; font-weight: 900 !important; box-shadow: 0 2px 8px rgba(162,253,240,0.4) !important; }
    /* 카드 하단 브랜드 레이블 */
    .card-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 4px 8px 6px; background: none; font-size: 8px; font-weight: 800; color: #071952; letter-spacing: .08em; text-transform: uppercase; pointer-events: none; }
    .card-label-sub { position: absolute; bottom: 14px; left: 0; right: 0; padding: 2px 8px; background: none; font-size: 7px; font-weight: 700; color: #071952; letter-spacing: .06em; text-transform: uppercase; pointer-events: none; opacity: .75; }
    /* 카테고리 어드바이스 박스 */
    .m-adv { margin: 12px 20px 10px; padding: 11px 14px; border-radius: 12px; background: rgba(0,95,99,0.15); border: 1px solid rgba(18,148,144,0.3); display: flex; align-items: center; gap: 8px; }
    .m-adv-lbl { font-size: 12px; font-weight: 800; color: #a2fdf0; white-space: nowrap; }
    .m-adv-txt { font-size: 12px; color: rgba(255,255,255,0.82); line-height: 1.4; }
    /* adv 박스 — 유사도 분석 모드 */
    .m-adv.m-adv-sim {
      flex-direction: column; align-items: stretch; gap: 6px;
      background: rgba(18,148,144,0.12);
      border-color: rgba(151,254,237,0.25);
    }
    /* 5점 미만: 어두운 배경 + 텍스트 화이트 */
    .m-adv.m-adv-sim.m-adv-low {
      background: rgba(10,10,20,0.6);
      border-color: rgba(255,255,255,0.1);
    }
    .m-adv.m-adv-sim.m-adv-low .m-adv-lbl { color: rgba(255,255,255,0.5); }
    .m-adv.m-adv-sim.m-adv-low .m-adv-sim-kws { color: rgba(255,255,255,0.45); }
    .m-adv.m-adv-sim.m-adv-low .m-adv-sim-item { color: rgba(255,255,255,0.5); }
    .m-adv-sim-top { display:flex; align-items:center; gap:6px; }
    .m-adv-sim-kws { font-size:10px; color:rgba(151,254,237,0.6); flex:1; line-height:1.4; }
    .m-adv-sim-score {
      font-size:11px; font-weight:900; padding:2px 7px; border-radius:8px; white-space:nowrap;
    }
    .m-adv-sim-score.sh { color:#a2fdf0; background:rgba(18,148,144,0.35); }
    .m-adv-sim-score.sm { color:#fbbf24; background:rgba(251,191,36,0.18); }
    .m-adv-sim-score.sl { color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.08); }
    .m-adv-sim-bar-wrap { height:2px; background:rgba(255,255,255,0.07); border-radius:2px; }
    .m-adv-sim-bar { height:2px; border-radius:2px; transition:width .5s ease; }
    .m-adv-sim-item { font-size:10px; font-weight:700; color:rgba(255,255,255,0.75); }
    .m-adv-sim-noitem { font-size:10px; color:rgba(255,255,255,0.25); font-style:italic; }
    /* SWIPE 힌트 */
    .m-swipe { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 4px; }
    .m-swipe-arr { font-family: 'Material Symbols Outlined'; font-size: 13px; color: rgba(18,148,144,0.55); font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
/* ── 모바일 옷장 토글 버튼 ── */
#closetToggleBtn {
  width:100%; cursor:pointer;
  padding:16px 20px 12px;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  background:rgba(255,255,255,0.04);
  border:1.5px solid rgba(151,254,237,0.2);
  border-radius:20px;
  transition:background .25s, border-color .25s, box-shadow .25s;
  font-family:'Outfit','Noto Sans KR',sans-serif;
}
#closetToggleBtn.ctb-on {
  background:rgba(18,148,144,0.22);
  border-color:rgba(151,254,237,0.65);
  box-shadow:0 0 20px rgba(151,254,237,0.08);
}
#closetToggleBtn .ctb-title {
  font-size:20px; font-weight:900; color:#70dbd4; letter-spacing:-.02em;
  transition:color .2s;
}
#closetToggleBtn.ctb-on .ctb-title { color:#a2fdf0; }
#closetToggleBtn .ctb-sub {
  font-size:10px; font-weight:700; color:rgba(151,254,237,0.45); letter-spacing:.03em;
  transition:color .2s;
}
#closetToggleBtn.ctb-on .ctb-sub { color:rgba(151,254,237,0.7); }

/* ── 유사도 패널 ── */
#closetMatchPanel { display:none; margin:0 5px 12px; }
#closetMatchPanel.cmp-open { display:block; }
.cmp-header {
  display:flex; align-items:center; gap:6px;
#closetMatchPanel { display:none; margin:0 5px 12px; }
#closetMatchPanel.cmp-open { display:block; }
.cmp-header {
  display:flex; align-items:center; gap:6px;
  padding:9px 14px;
  background:rgba(18,148,144,0.18);
  border:1px solid rgba(151,254,237,0.18);
  border-bottom:none;
  border-radius:14px 14px 0 0;
}
.cmp-header-txt { font-size:10px; font-weight:900; color:#97FEED; letter-spacing:.1em; }
.cmp-body {
  border:1px solid rgba(151,254,237,0.12);
  border-radius:0 0 14px 14px; overflow:hidden;
}
.cmp-row {
  display:grid; grid-template-columns:20px 62px 1fr 10px 1fr 38px;
  align-items:center; gap:4px;
  padding:8px 12px;
  border-bottom:1px solid rgba(255,255,255,0.04);
  background:rgba(7,25,82,0.55);
}
.cmp-row:last-child { border-bottom:none; }
.cmp-row:nth-child(even) { background:rgba(13,31,60,0.6); }
.cmp-icon { font-size:14px; text-align:center; }
.cmp-cat { font-size:9px; font-weight:900; color:rgba(151,254,237,0.7); }
.cmp-ai-kws { font-size:9px; color:rgba(255,255,255,0.45); line-height:1.4; }
.cmp-arrow { font-size:10px; color:rgba(151,254,237,0.3); text-align:center; }
.cmp-item-name { font-size:9px; font-weight:700; color:rgba(255,255,255,0.8); line-height:1.4; }
.cmp-score-badge {
  font-size:10px; font-weight:900; text-align:right; padding:2px 5px;
  border-radius:6px; white-space:nowrap;
}
.cmp-score-high { color:#a2fdf0; background:rgba(18,148,144,0.25); }
.cmp-score-mid  { color:#fbbf24; background:rgba(251,191,36,0.15); }
.cmp-score-low  { color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.05); }
.cmp-no-item    { padding:8px 12px; font-size:9px; color:rgba(255,255,255,0.25); font-style:italic; }
.cmp-bar-wrap   { grid-column:1/-1; height:2px; background:rgba(255,255,255,0.06); border-radius:2px; margin:0 0 2px; }
.cmp-bar        { height:2px; border-radius:2px; transition:width .6s ease; }
.cmp-summary {
  padding:9px 14px;
  border-top:1px solid rgba(151,254,237,0.08);
  background:rgba(18,148,144,0.08);
  font-size:10px; font-weight:700; color:rgba(151,254,237,0.7);

.cb-nav{position:fixed;bottom:0;left:0;right:0;z-index:99999;padding:0 16px 10px;pointer-events:none;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.cb-nav-inner{pointer-events:all;max-width:400px;margin:0 auto;height:62px;border-radius:9999px;background:rgba(7,19,42,.55);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:0 24px 48px -8px rgba(2,13,36,.45);display:flex;justify-content:space-around;align-items:center;padding:0 6px;}
.cb-nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(216,226,255,.4);text-decoration:none;padding:6px 12px;border-radius:9999px;transition:all .2s;font-family:'Inter','Noto Sans KR',sans-serif;}
.cb-nav-tab .ni{font-family:'Material Symbols Outlined';font-size:22px;line-height:1;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 22;}
.cb-nav-tab .nl{font-size:9px;font-weight:600;letter-spacing:.02em;}
.cb-nav-tab.on{color:#07132a;background:linear-gradient(135deg,#4cdbce,#13bbaf);padding:6px 16px;}
.cb-nav-tab.on .ni{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 22;}
.cb-spacer{height:82px;}
</style>

<body>
<header class="pt-4 px-5 pb-3">
  <div class="flex items-center justify-between">
    <h1 class="text-xl font-bold tracking-tight" style="color:#a2fdf0;">Ai 옷장</h1>
    <a href="mypage.html" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.08);border:1px solid rgba(151,254,237,0.15);">
      <span class="material-symbols-outlined" style="font-size:18px;color:rgba(151,254,237,0.5);">person</span>
    </a>
  </div>
</header>
<main class="pb-32">
  <!-- 내 Ai 옷장 (다크 m_closet_0308) -->
  <section class="px-0 mt-8">
    <div class="pt-2">

      <!-- ★ Ai 옷장 토글 버튼 -->
      <div class="px-5 pb-3">
        <button id="closetToggleBtn" type="button">
          <span class="ctb-title">Ai 옷장</span>
          <span class="ctb-sub">클릭하면 AI가 추천한 코디를 내 옷에서 찾아드립니다</span>
        </button>
      </div>

      <!-- ★ 유사도 분석 패널 (토글 시 표시) -->
      <div id="closetMatchPanel">
        <div class="cmp-header">
          <span class="material-symbols-outlined text-[14px]" style="color:#97FEED;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 14;">compare_arrows</span>
          <span class="cmp-header-txt">AI 추천코디 × 내 옷장 유사도 분석</span>
        </div>
        <div class="cmp-body" id="cmpBody">
          <div class="cmp-no-item">AI 코디를 먼저 생성하면 유사도를 분석해드려요.</div>
        </div>
        <div class="cmp-summary" id="cmpSummary" style="display:none;">
          <span class="material-symbols-outlined text-[13px]" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 13;">auto_awesome</span>
          <span id="cmpSummaryText"></span>
        </div>
      </div>

      <div id="catList" class="space-y-0 py-2"></div>

      <div class="pb-6">
        <button id="openAddCategory" class="w-full py-4 rounded-3xl font-extrabold text-[13px] flex items-center justify-center gap-2 active:scale-[0.99] transition-all text-white"
          style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(151,254,237,0.2);font-family:'Outfit','Noto Sans KR',sans-serif;">
          <span class="material-symbols-outlined filled" style="color:#97FEED;">add</span>카테고리 추가
        </button>
      </div>
    </div>
  </section>
</main>
<div id="pickCatModal" class="hidden fixed inset-0 z-[80] bg-black/60 backdrop-blur-sm">
  <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[92%] max-w-md bg-white rounded-3xl p-6 shadow-2xl">
    <div class="flex items-start justify-between gap-4 mb-5">
      <div><p class="text-[10px] font-bold tracking-[0.3em] text-accent">아이템 등록</p><h3 class="text-xl font-serif">어느 카테고리에 추가할까요?</h3></div>
      <button id="closePickCat" class="w-10 h-10 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center active:scale-95"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div id="pickCatList" class="grid grid-cols-2 gap-3"></div>
  </div>
</div>
<div id="addCatModal" class="hidden fixed inset-0 z-[90] bg-black/60 backdrop-blur-sm">
  <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[92%] max-w-md bg-white rounded-3xl p-6 shadow-2xl">
    <div class="flex items-start justify-between gap-4 mb-5">
      <div><p class="text-[10px] font-bold tracking-[0.3em] text-accent">카테고리</p><h3 class="text-xl font-serif">카테고리 추가</h3></div>
      <button id="closeAddCat" class="w-10 h-10 rounded-full bg-slate-50 border border-slate-200 flex items-center justify-center active:scale-95"><span class="material-symbols-outlined">close</span></button>
    </div>
    <input id="newCatName" type="text" class="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm" placeholder="예: 가방, 모자, 안경…"/>
    <p id="addCatErr" class="mt-2 text-xs text-red-600 hidden"></p>
    <div class="mt-6 grid grid-cols-2 gap-3">
      <button id="cancelAddCat" class="py-3.5 rounded-2xl bg-white border border-slate-200 font-bold">취소</button>
      <button id="applyAddCat" class="py-3.5 rounded-2xl bg-primary text-white font-extrabold">추가하기</button>
    </div>
  </div>
</div>

<div class="cb-spacer"></div>
<nav class="cb-nav">
  <div class="cb-nav-inner">
    <a href="closet.html" class="cb-nav-tab"><span class="ni">auto_awesome</span><span class="nl">코디쌤</span></a>

function playTick(){try{const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;if(!_dc)_dc=new AC();if(_dc.state==='suspended')_dc.resume().catch(()=>{});const t0=_dc.currentTime;[[820,0,0.035,0.10],[540,0.03,0.04,0.07]].forEach(([f,s,d,p])=>{const o=_dc.createOscillator(),g=_dc.createGain();o.type='square';o.frequency.setValueAtTime(f,t0+s);g.gain.setValueAtTime(0.0001,t0+s);g.gain.exponentialRampToValueAtTime(p,t0+s+0.004);g.gain.exponentialRampToValueAtTime(0.0001,t0+s+d);o.connect(g);g.connect(_dc.destination);o.start(t0+s);o.stop(t0+s+d+0.01);});}catch(_){}}
function layerContent(el,item,catKey){
  el.innerHTML='';
  el.classList.remove('sparkle');
  const nid=item?.id?String(item.id):'';
  el.dataset.itemId=nid;
  el.dataset.catKey=String(catKey||'');
  el.href=item?.id?`item.html?id=${encodeURIComponent(item.id)}`:`camera.html?category=${encodeURIComponent(catKey)}`;

  // ✅ 추천 코디 매칭 아이템이면 강조(스파클) + 매칭 점수 배지
  // coat↔jacket 등 대체 카테고리 포함 매칭 아이템 ID 조회
  const _subKL = CAT_SUBSTITUTE_MAP[String(catKey||'').toLowerCase()]||[];
  const recId = (S.hasGenerated&&S.matchByCat) ? ([catKey,..._subKL].map(k=>S.matchByCat[k]).find(v=>v)||'') : '';
  const isMatched = !!(recId && nid && nid===recId);
  if(isMatched){ el.classList.add('sparkle'); }
  // 매칭 배지 (이미지 하단 오른쪽)
  const prevBadge = el.querySelector('.match-score-badge');
  if(prevBadge) prevBadge.remove();
  const iid = item && item.id ? String(item.id) : '';
  const scoreVal   = isMatched && iid && S.matchScoreMap   ? (S.matchScoreMap[iid]   || 0) : 0;
  const detailVal  = isMatched && iid && S.matchDetailMap  ? (S.matchDetailMap[iid]  || null) : null;
  if(isMatched && scoreVal){
    const badge = document.createElement('div');
    badge.className = 'match-score-badge';
    // 10P 척도 표시 + 세부 내역 툴팁
    badge.textContent = `MATCH ${scoreVal}P`;
    if(detailVal){
      badge.title = `카테고리 ${detailVal.catScore}P + 컬러 ${detailVal.colorScore}P + 디자인 ${detailVal.designScore}P = ${detailVal.total}P`;
    }
    el.appendChild(badge);
  }

  const ref=item?.images?.front||item?.images?.brand||item?.images?.back||'';
  const rt=`${nid}::${ref}`;
  el.dataset.renderToken=rt;
  if(!ref){
    const ic=document.createElement('span');
    ic.className='material-symbols-outlined layer-icon';

    el.appendChild(ic);
    const tx=document.createElement('div');
    tx.className='layer-ph mt-2';
    tx.textContent=item?.id?'이미지 없음':'추가';
    el.appendChild(tx);
    return;
  }
  const ph=document.createElement('div');
  ph.className='layer-ph';
  ph.textContent='…';
  el.appendChild(ph);
  CodiBank.getImageSrc(ref).then(src=>{
    if(el.dataset.renderToken!==rt)return;
    if(!src){ph.textContent='이미지 없음';return;}
    // ── 카드 하단: 컬러(1줄) + 패턴·소재(2줄), 배경 없이 텍스트만
    const _g = item?.meta?.gemini;
    const _colorTxt = (_g?.main_color_name || item?.color || '').slice(0,12);
    const _patternTxt = (_g?.pattern && _g.pattern !== '단색') ? _g.pattern : '';
    const _materialTxt = _g?.material ? _g.material.split(',')[0].trim().slice(0,8) : '';

    el.innerHTML = `<img class="layer-img" alt="아이템" src="${src}"/>` +
      (_subLine ? `<div class="card-label-sub">${_subLine}</div>` : '') +
      (_colorTxt ? `<div class="card-label">${_colorTxt}</div>` : '');
  });
}

function rotL(a){if(!a.length)return a;return a.slice(1).concat(a[0]);}
function rotR(a){if(!a.length)return a;return[a[a.length-1]].concat(a.slice(0,-1));}
function mod(n,m){return((n%m)+m)%m;}
function initWin(items,si){const l=items.length;if(l<=0)return[-1,-1,-1,-1,-1];if(l>=5)return[0,1,2,3,4].map(i=>mod(si+i,l));return[0,1,2,3,4].map(i=>i<l?i:-1);}
function attachSwipe(deck,ctrl){let dn=false,sx=0,sy=0;const TH=48;deck.addEventListener('pointerdown',e=>{dn=true;sx=e.clientX;sy=e.clientY;try{deck.setPointerCapture(e.pointerId);}catch(_){}});deck.addEventListener('pointermove',e=>{if(!dn)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy))e.preventDefault();},{passive:false});function end(e){if(!dn)return;dn=false;const dx=(e.clientX||0)-sx,dy=(e.clientY||0)-sy;if(Math.abs(dx)>TH&&Math.abs(dx)>Math.abs(dy)){dx<0?ctrl.shift(+1):ctrl.shift(-1);}}deck.addEventListener('pointerup',end);deck.addEventListener('pointercancel',()=>{dn=false;});deck.addEventListener('lostpointercapture',()=>{dn=false;});}

function _simTokenize(str){ return String(str||'').toLowerCase().replace(/[^가-힣a-z0-9\s]/g,'').split(/\s+/).filter(Boolean); }
function _simScore(aiKws, itemFields){
  const aiSet = new Set(aiKws.flatMap(k=>_simTokenize(k)));
  if(!aiSet.size) return 0;
  const itToks = itemFields.flatMap(f=>_simTokenize(f));
  let hit = 0;
  aiSet.forEach(tok=>{ if(itToks.some(t=>t.includes(tok)||tok.includes(t))) hit++; });
  const itSet = new Set(itToks);
  itSet.forEach(tok=>{ if([...aiSet].some(a=>a.includes(tok)||tok.includes(a))) hit += 0.3; });
  return Math.min(100, Math.round((hit / aiSet.size) * 100));
}
// 카테고리 키 → {aiKws, best(item), score} 반환
function _getCatSimData(catKey){
  // pickBestItemByScore 기반 10점 만점 매칭 점수
  if(!S.hasGenerated) return null;
  const ckw = S.categoryKeywords || {};
  const _outerSet = new Set(['outer','coat','jacket','padding','cardigan']);
  const _bottomSet = new Set(['bottom','pants','slacks','jeans','skirt']);
  const _topSet    = new Set(['top','shirt','knit','tshirt','blouse']);
  const _shoesSet  = new Set(['shoes','sneakers','loafers','boots']);
  const _scarfSet  = new Set(['scarf','muffler','neckwear','accent']);
  let ckwKey = catKey;
  if(_outerSet.has(catKey))  ckwKey = 'outer';
  else if(_bottomSet.has(catKey)) ckwKey = 'bottom';
  else if(_topSet.has(catKey))    ckwKey = 'top';
  else if(_shoesSet.has(catKey))  ckwKey = 'shoes';
  else if(_scarfSet.has(catKey))  ckwKey = 'scarf';
  const aiKws = (ckw[ckwKey]||[]).filter(Boolean);

  // matchPairs에서 해당 카테고리 wantPair 찾기
  const matchPairs = S.matchPairs || [];
  let wantPair = matchPairs.find(p=>{
    const pk = String(p.key||'').toLowerCase();
    if(_outerSet.has(catKey) && _outerSet.has(pk)) return true;
    if(_bottomSet.has(catKey) && _bottomSet.has(pk)) return true;
    return pk === catKey;
  });
  if(!wantPair){
    // fallback: categoryKeywords 첫 칩에서 컬러 추출
    const colorHint = (aiKws[0]||'').replace(/(코트|자켓|가디건|상의|하의|신발|레이어드|포인트|악세서리)/g,'').trim();
    wantPair = { key: catKey, color: colorHint };
  }

  // 아이템 수집 (대체 카테고리 포함)
  const _subKs = CAT_SUBSTITUTE_MAP[catKey] || [];
  const allItems = [catKey, ..._subKs]
    .flatMap(k=>(CodiBank.getItemsByUserAndCategory?CodiBank.getItemsByUserAndCategory(user.email,k):[]) || [])
    .filter(Boolean);

  if(!allItems.length) return { aiKws, best:null, score:0 };

  const best = pickBestItemByScore(wantPair, allItems);
  const score = best?._matchScore ?? 0;
  return { aiKws, best, score };
}

function buildSection(catMeta,items){
  // ── 섹션 루트 ──
  const sec=document.createElement('section');sec.className='mt-0';sec.dataset.catKey=catMeta.key;
  sec.style.cssText='border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:20px;';

  // ── 카테고리 헤더: 제목(중앙)+추가버튼(우측) ──
  const hdr=document.createElement('div');hdr.className='relative flex justify-center items-center pt-7 pb-2 px-5';
  const titleEl=document.createElement('h3');
  titleEl.className='text-[17px] font-bold text-white';
  titleEl.style.cssText='border-bottom:2px solid #129490;padding-bottom:5px;display:inline-block;';
  titleEl.innerHTML=`${escH(catMeta.label)}&nbsp;<span style="color:#70dbd4;">${items.length}개</span>`;
  const addBtn=document.createElement('button');
  addBtn.className='absolute right-5 top-7 w-8 h-8 rounded-full flex items-center justify-center active:scale-90 transition-transform';
  addBtn.style.cssText='background:rgba(151,254,237,0.08);border:1px solid rgba(151,254,237,0.2);';
  addBtn.innerHTML='<span class="material-symbols-outlined filled" style="font-size:16px;color:#97FEED;">add</span>';
  addBtn.addEventListener('click',()=>{window.location.href=`camera.html?category=${encodeURIComponent(catMeta.key)}`;});
  hdr.appendChild(titleEl);hdr.appendChild(addBtn);
  sec.appendChild(hdr);

  // ── codibank 어드바이스 박스 ──
  const _subKA = CAT_SUBSTITUTE_MAP[String(catMeta.key||'').toLowerCase()]||[];
  const recId0 = (S.hasGenerated&&S.matchByCat) ? ([catMeta.key,..._subKA].map(k=>S.matchByCat[k]).find(v=>v)||'') : '';
  const score0=recId0&&S.matchScoreMap?(S.matchScoreMap[recId0]||0):0;
  const detail0=recId0&&S.matchDetailMap?(S.matchDetailMap[recId0]||null):null;
  const adv=document.createElement('div');adv.className='m-adv';

  // 토글(모바일 옷장 Styling) ON 여부 확인
  const _simOn = document.getElementById('closetToggleBtn')?.classList.contains('ctb-on');

  if(_simOn && S.hasGenerated){
    // ── 유사도 분석 모드 (10점 만점 점수 기반) ──
    const simData = _getCatSimData(catMeta.key);
    if(simData){
      adv.classList.add('m-adv-sim');
      const sc = simData.score; // 0~10
      const isLow = sc < 5;
      if(isLow) adv.classList.add('m-adv-low');
      // 점수 구간: 7↑ 높음(sh), 4~6 중간(sm), 0~3 낮음(sl)
      const scClass = sc>=7?'sh':sc>=4?'sm':'sl';
      const barPct  = sc * 10; // 0~100%
      const barColor= sc>=7?'#a2fdf0':sc>=4?'#fbbf24':'rgba(255,255,255,0.25)';
      const kwsText = simData.aiKws.join(' · ');
      const itemLabel = simData.best
        ? (simData.best.brand||simData.best.color||'아이템')
        : null;
      const itemSub = (simData.best?.color && simData.best?.brand) ? ` · ${escH(simData.best.color)}` : '';
      const scoreDetail = simData.best
        ? `카테고리 ${simData.best._catScore||0}P + 컬러 ${simData.best._colorScore||0}P + 디자인 ${simData.best._designScore||0}P`
        : '';
      adv.innerHTML =
        `<div class="m-adv-sim-top">` +
          `<span class="m-adv-lbl">codibank :</span>` +
          `<span class="m-adv-sim-kws">${escH(kwsText)}</span>` +
          `<span class="m-adv-sim-score ${scClass}" title="${escH(scoreDetail)}">${sc}P</span>` +
        `</div>` +
        `<div class="m-adv-sim-bar-wrap"><div class="m-adv-sim-bar" style="width:${barPct}%;background:${barColor};"></div></div>` +
        (itemLabel
          ? `<div class="m-adv-sim-item">› ${escH(itemLabel)}${itemSub}${scoreDetail ? ` <span style="font-size:9px;opacity:0.45;">(${escH(scoreDetail)})</span>` : ''}</div>`
          : `<div class="m-adv-sim-noitem">등록된 아이템 없음 — 추가해보세요</div>`);
    } else {
      adv.innerHTML=`<span class="m-adv-lbl">codibank :</span><span class="m-adv-txt" style="color:rgba(255,255,255,0.35);">AI 코디 키워드 없음</span>`;
    }
  } else if(score0){
    const tip=detail0?`카테고리 ${detail0.catScore}P + 컬러 ${detail0.colorScore}P + 디자인 ${detail0.designScore}P`:'';
    adv.innerHTML=`<span class="m-adv-lbl">codibank :</span><span class="m-adv-txt">이 아이템은 추천코디와 매칭점수 <strong style="color:#a2fdf0;">${score0}P</strong>`+(tip?` <span style="font-size:10px;color:rgba(255,255,255,0.4);">(${tip})</span>`:'')+'</span>';
  } else if(S.hasGenerated){
    adv.innerHTML=`<span class="m-adv-lbl">codibank :</span><span class="m-adv-txt" style="color:rgba(255,255,255,0.5);">스와이프해서 AI 추천 아이템을 확인하세요</span>`;
  } else {
    // 추천코디 없을 때: 아이템 분석 정보 표시
    if(items && items.length > 0) {
      const _gi = items[0]?.meta?.gemini;
      if(_gi && (_gi.pattern || _gi.material || _gi.main_color_name)) {
        const _info = [_gi.main_color_name, _gi.pattern !== '단색' ? _gi.pattern : '', _gi.material?.split(',')[0]].filter(Boolean).join(' · ');
        const _lbl = (window.CodiBankI18n && CodiBankI18n.isEn()) ? 'AI Analysis:' : 'AI분석 :';
        adv.innerHTML=`<span class="m-adv-lbl" style="color:rgba(151,254,237,0.4);">${_lbl}</span><span class="m-adv-txt" style="color:rgba(255,255,255,0.5);">${_info}</span>`;
      } else {
        adv.innerHTML=`<span class="m-adv-lbl" style="color:rgba(151,254,237,0.4);">codibank :</span><span class="m-adv-txt" style="color:rgba(255,255,255,0.35);">← 스와이프로 아이템을 탐색하세요</span>`;
      }
    } else {
      adv.innerHTML=`<span class="m-adv-lbl" style="color:rgba(151,254,237,0.4);">codibank :</span><span class="m-adv-txt" style="color:rgba(255,255,255,0.35);">← 스와이프로 아이템을 탐색하세요</span>`;
    }
  }
  sec.appendChild(adv);

  // ── SWIPE 힌트 ──
  const sw=document.createElement('div');sw.className='m-swipe';
  sw.innerHTML='<span class="m-swipe-arr">west</span><span class="m-swipe-txt">Swipe</span><span class="m-swipe-arr">east</span>';
  sec.appendChild(sw);

  // ── 카드 덱 래퍼 ──
  const dw=document.createElement('div');dw.className='overflow-visible';dw.style.cssText='padding:4px 0;';
  const deck=document.createElement('div');deck.className='closet-container';
  const ctrl={catKey:catMeta.key,items:Array.isArray(items)?items:[],startIndex:0,windowIndices:[-1,-1,-1,-1,-1],els:[],animating:false,
    shift(dir){if(this.animating)return;const l=this.items.length;if(l<=0)return;this.animating=true;playTick();deck.classList.add('is-shifting');const MOVE=520,EXIT=200,POP=380,UNL=EXIT+MOVE+120;if(l>=5){this.startIndex=mod(this.startIndex+(dir>0?1:-1),l);this.windowIndices=[0,1,2,3,4].map(i=>mod(this.startIndex+i,l));}else{this.windowIndices=(dir>0)?rotL(this.windowIndices):rotR(this.windowIndices);}const oe=this.els.slice(),lv=dir>0?oe[0]:oe[oe.length-1];if(!lv){this.animating=false;deck.classList.remove('is-shifting');return;}const ne=dir>0?oe.slice(1).concat(lv):[lv].concat(oe.slice(0,-1));this.els=ne;this.els.forEach(e=>e.classList.remove('exit-left','exit-right','enter-from-left','enter-from-right','center-pop'));lv.classList.add(dir>0?'exit-left':'exit-right');for(let i=0;i<ne.length;i++){if((dir>0&&i===4)||(dir<0&&i===0))continue;slc(ne[i],i+1);}const ce=ne[2];if(ce)setTimeout(()=>{if(!this.animating)return;ce.classList.remove('center-pop');try{void ce.offsetHeight;}catch(_){}ce.classList.add('center-pop');setTimeout(()=>ce.classList.remove('center-pop'),560);},POP);setTimeout(()=>{if(!this.animating)return;lv.classList.remove('exit-left','exit-right');const ep=dir>0?5:1,ei=dir>0?this.windowIndices[4]:this.windowIndices[0];layerContent(lv,ei>=0?this.items[ei]:null,this.catKey);lv.classList.add('no-transition');slc(lv,ep);lv.classList.add(dir>0?'enter-from-right':'enter-from-left');try{void lv.offsetHeight;}catch(_){}lv.classList.remove('no-transition');requestAnimationFrame(()=>lv.classList.remove(dir>0?'enter-from-right':'enter-from-left'));},EXIT);setTimeout(()=>{this.animating=false;deck.classList.remove('is-shifting');if(lv)lv.classList.remove('exit-left','exit-right','enter-from-left','enter-from-right','no-transition');},UNL);}};
  const l=ctrl.items.length;
  // ✅ 기본: 최신 등록 아이템이 3번째(가운데) 카드에 오도록 startIndex 보정
  if(l>=5) ctrl.startIndex = mod(-2, l);

  // ✅ 추천 코디 매칭 아이템(카테고리별) 우선으로 가운데에 배치
  // coat↔jacket 대체 포함 매칭 아이템 ID (카드 가운데 배치용)
  const _subKD = CAT_SUBSTITUTE_MAP[String(catMeta.key||'').toLowerCase()]||[];
  const recId = (S.hasGenerated&&S.matchByCat) ? ([catMeta.key,..._subKD].map(k=>S.matchByCat[k]).find(v=>v)||'') : '';
  const preferredId = recId || (highlightId ? String(highlightId) : '');
  let preferredIndex = -1;
  if(preferredId && l>0){
    preferredIndex = ctrl.items.findIndex(x=>x&&String(x.id)===preferredId);
    if(preferredIndex>=0 && l>=5) ctrl.startIndex = mod(preferredIndex-2, l);
  }
  ctrl.windowIndices=initWin(ctrl.items,ctrl.startIndex);
  // l<5에서도 가운데(3번째) 카드에 (추천/하이라이트/최신) 아이템이 오도록 회전
  if(l>0&&l<5){
    const hi = (preferredIndex>=0) ? preferredIndex : 0;
    let w=ctrl.windowIndices.slice();
    const sh=2-hi;
    if(sh>0)for(let i=0;i<sh;i++)w=rotR(w);
    else if(sh<0)for(let i=0;i<Math.abs(sh);i++)w=rotL(w);
    ctrl.windowIndices=w;
  }
  for(let pos=1;pos<=5;pos++){const a=document.createElement('a');a.className=`clothing-layer layer-${pos}`;const idx=ctrl.windowIndices[pos-1];layerContent(a,idx>=0?ctrl.items[idx]:null,catMeta.key);ctrl.els.push(a);deck.appendChild(a);}
  attachSwipe(deck,ctrl);
  const hl=(focusCat&&focusCat===catMeta.key)
    || (highlightId&&ctrl.items.some(x=>x&&String(x.id)===String(highlightId)))
    || (!!recId);
  if(hl){deck.classList.add('deck-highlight','pulse-ring');setTimeout(()=>deck.classList.remove('pulse-ring'),1600);}
  dw.appendChild(deck);sec.appendChild(dw);return sec;
}
function renderCategories(){catListEl.innerHTML='';CodiBank.getCategoriesForUser(user.email).forEach(c=>{catListEl.appendChild(buildSection(c,CodiBank.getItemsByUserAndCategory(user.email,c.key)));});if(focusCat){const t=document.querySelector(`[data-cat-key="${CSS.escape(focusCat)}"]`);if(t)setTimeout(()=>t.scrollIntoView({behavior:'smooth',block:'start'}),120);}}
renderCategories();
// ── Ai 옷장 토글 버튼 ────────────────────────────────────
(function(){
  const btn   = document.getElementById('closetToggleBtn');
  const panel = document.getElementById('closetMatchPanel');
  if(!btn || !panel) return;

  // ── 유사도 계산 (전역 _simScore/_simTokenize 위임) ──
  const tokenize = _simTokenize;
  const similarity = _simScore;

  // ── 패널 렌더 ──
  const CAT_DEF = [
    {key:'outer',  label:'아우터',       icon:'🧥'},
    {key:'top',    label:'탑/셔츠',      icon:'👔'},
    {key:'bottom', label:'하의',         icon:'👖'},
    {key:'shoes',  label:'신발',         icon:'👟'},
    {key:'scarf',  label:'스카프·포인트',icon:'🧣'},
    {key:'bag',    label:'가방',         icon:'👜'},
    {key:'watch',  label:'시계',         icon:'⌚'},
    {key:'socks',  label:'양말',         icon:'🧦'},
  ];
  // CAT_SUBSTITUTE_MAP과 동일하게 유지 (자켓/코트/패딩/가디건 모두 포함)
  const SUB = {
    outer:   ['coat','jacket','padding','cardigan'],
    coat:    ['jacket','padding','outer','cardigan'],
    jacket:  ['coat','padding','outer','cardigan'],
    padding: ['coat','jacket','outer'],
    cardigan:['outer','jacket','coat'],
    bottom:['pants','skirt'],pants:['bottom'],shoes:['sneakers','loafers'],
    top:['shirt','blouse'],scarf:['accent'],
  };

  function buildMatchPanel(){
    const body    = document.getElementById('cmpBody');
    const summary = document.getElementById('cmpSummary');
    const sumTxt  = document.getElementById('cmpSummaryText');
    if(!body) return;

    const ckw = S.categoryKeywords || {};
    const hasAI = S.hasGenerated && Object.keys(ckw).length > 0;

    if(!hasAI){
      body.innerHTML = '<div class="cmp-no-item">AI 코디를 먼저 생성하면 유사도를 분석해드려요.</div>';
      if(summary) summary.style.display = 'none';
      return;
    }

    let html = '';
    let totalScore = 0, scoredCount = 0;

    CAT_DEF.forEach(({key, label, icon})=>{
      const aiKws = (ckw[key]||[]).filter(Boolean);
      if(!aiKws.length) return;

      // 카테고리 + 대체 카테고리 아이템 모두 수집
      const subKeys = SUB[key] || [];
      const items   = [key, ...subKeys]
        .flatMap(k => (CodiBank.getItemsByUserAndCategory ? CodiBank.getItemsByUserAndCategory(user.email, k) : []) || [])
        .filter(Boolean);

      const aiText = aiKws.join(' · ');

      if(!items.length){
        html += `<div class="cmp-row">
          <span class="cmp-icon">${icon}</span>
          <span class="cmp-cat">${escH(label)}</span>
          <span class="cmp-ai-kws" style="grid-column:3/7;color:rgba(151,254,237,0.35);">${escH(aiText)} — <em style="color:rgba(255,255,255,0.2);">아이템 없음</em></span>
        </div>`;
        return;
      }

      // 아이템별 유사도 계산 → 가장 높은 것 선택
      let best = null, bestScore = -1;
      items.forEach(it=>{
        const fields = [it.brand, it.color, it.subColor, it.note, it.size, it.category, it.categoryKey]
          .filter(Boolean).map(String);
        const sc = similarity(aiKws, fields);
        if(sc > bestScore){ bestScore = sc; best = it; }
      });

      totalScore += bestScore;
      scoredCount++;

      const scoreClass = bestScore >= 60 ? 'cmp-score-high' : bestScore >= 30 ? 'cmp-score-mid' : 'cmp-score-low';
      const barColor   = bestScore >= 60 ? '#a2fdf0' : bestScore >= 30 ? '#fbbf24' : 'rgba(255,255,255,0.2)';
      const itemLabel  = escH(best?.brand || best?.color || '아이템');
      const itemSub    = best?.color ? ` · ${escH(best.color)}` : '';

      html += `<div class="cmp-row">
        <span class="cmp-icon">${icon}</span>
        <span class="cmp-cat">${escH(label)}</span>
        <span class="cmp-ai-kws">${escH(aiText)}</span>
        <span class="cmp-arrow">›</span>
        <span class="cmp-item-name">${itemLabel}${itemSub}</span>
        <span class="cmp-score-badge ${scoreClass}">${bestScore}%</span>
      </div>
      <div class="cmp-row" style="padding-top:0;padding-bottom:6px;grid-template-columns:1fr;">
        <div class="cmp-bar-wrap"><div class="cmp-bar" style="width:${bestScore}%;background:${barColor};"></div></div>
      </div>`;
    });

    if(!html){
      body.innerHTML = '<div class="cmp-no-item">카테고리별 AI 추천 키워드가 아직 없어요.</div>';
      if(summary) summary.style.display = 'none';
      return;
    }

    body.innerHTML = html;

    // 요약
    if(summary && sumTxt && scoredCount > 0){
      const avg = Math.round(totalScore / scoredCount);
      const msg = avg >= 65 ? `내 옷장이 오늘 AI 추천코디와 ${avg}% 매칭돼요! 지금 바로 입어보세요 ✦`
                : avg >= 35 ? `평균 ${avg}% 매칭. 부족한 카테고리 아이템을 추가해보세요.`
                : `평균 ${avg}% 매칭. 아이템을 더 등록하면 정확도가 높아져요.`;
      sumTxt.textContent = msg;
      summary.style.display = 'flex';
    }
  }

  // ── 토글 클릭 ──
  let isOn = false;
  btn.addEventListener('click', ()=>{
    isOn = !isOn;
    btn.classList.toggle('ctb-on', isOn);
    panel.classList.toggle('cmp-open', isOn);

    const titleEl = btn.querySelector('.ctb-title');
    const subEl   = btn.querySelector('.ctb-sub');
    if(isOn){
      if(titleEl) titleEl.textContent = 'Ai 옷장 Styling';
      if(subEl)   subEl.textContent   = 'AI 추천코디와 내 옷장 유사도 분석 중…';
      buildMatchPanel();
      // ★ 각 카테고리 adv 박스에 유사도 반영
      try{ renderCategories(); }catch(_){}
      if(subEl) setTimeout(()=>{ subEl.textContent = 'AI 추천코디와 내 옷장을 비교한 결과예요'; }, 400);
    } else {
      if(titleEl) titleEl.textContent = 'Ai 옷장';
      if(subEl)   subEl.textContent   = '클릭하면 AI가 추천한 코디를 내 옷에서 찾아드립니다';
      // ★ 유사도 모드 해제 → adv 박스 원래대로
      try{ renderCategories(); }catch(_){}
    }
  });

  // 외부에서 호출 가능하도록 등록 (AI 생성 완료 후 패널 갱신)
  window._refreshClosetMatchPanel = ()=>{
    if(isOn){
      buildMatchPanel();
      try{ renderCategories(); }catch(_){}
    }
  };
})();


// 검색
function openSearch(){document.getElementById('searchModal')?.classList.remove('hidden');setTimeout(()=>document.getElementById('searchInput')?.focus(),50);}

</script>
