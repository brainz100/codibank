<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>CODIBANK - 회원가입</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', sans-serif; background: #071952; color: #fff; min-height: 100dvh; }
  .glass { background: linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.03) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.12); }
  .input-field {
    width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
    border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none;
    transition: border-color .2s; -webkit-appearance: none;
  }
  .input-field:focus { border-color: #97FEED; }
  .input-field::placeholder { color: rgba(255,255,255,.35); }
  .field-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 6px; letter-spacing: .04em; }
  .btn-primary { background: linear-gradient(135deg,#0B666A,#35A29F); color: #fff; font-weight: 800; border: none; border-radius: 16px; padding: 16px; font-size: 17px; cursor: pointer; width: 100%; transition: transform .15s; }
  .btn-primary:active { transform: scale(.97); }
  .select-group { display: flex; gap: 8px; }
  .sel-btn {
    flex: 1; padding: 12px 8px; border-radius: 12px; border: 1.5px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.05); color: rgba(255,255,255,.6); font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; transition: all .2s;
  }
  .sel-btn.active { border-color: #97FEED; background: rgba(151,254,237,.12); color: #97FEED; }
  .err-msg { color: #ff6b6b; font-size: 13px; margin-top: 8px; display: none; }
  .err-msg.show { display: block; }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.2); transition: background .3s; }
  .step-dot.active { background: #97FEED; }
  .bg-mesh {
    background:
      radial-gradient(at 0% 0%, rgba(11,102,106,.28) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(53,162,159,.18) 0px, transparent 50%);
  }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24; }
  .step-panel { display: none; }
  .step-panel.active { display: block; }
</style>
</head>
<body class="bg-mesh">

<div class="min-h-screen flex flex-col items-center justify-center px-5 py-12">

  <!-- 로고 -->
  <a href="../index.html" class="mb-8 text-3xl font-black tracking-tighter">
    CODI<span style="color:#97FEED">BANK</span>
  </a>

  <!-- 카드 -->
  <div class="glass rounded-[28px] w-full max-w-[420px] p-8">

    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-extrabold mb-1">회원가입</h2>
        <p class="text-sm text-white/50" id="stepLabel">STEP 1 / 2 — 계정 정보</p>
      </div>
      <div class="flex gap-2">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot"        id="dot2"></div>
      </div>
    </div>

    <!-- ── STEP 1: 계정 정보 ── -->
    <div class="step-panel active" id="step1">
      <div class="space-y-4">
        <div>
          <p class="field-label">이메일 (아이디)</p>
          <input id="s1_email" type="email" class="input-field" placeholder="example@email.com"/>
        </div>
        <div>
          <p class="field-label">비밀번호 (영문+숫자 4자 이상)</p>
          <input id="s1_pw" type="password" class="input-field" placeholder="비밀번호"/>
        </div>
        <div>
          <p class="field-label">비밀번호 확인</p>
          <input id="s1_pw2" type="password" class="input-field" placeholder="비밀번호 재입력"/>
        </div>
        <div>
          <p class="field-label">휴대폰 번호</p>
          <input id="s1_phone" type="tel" class="input-field" placeholder="010-0000-0000"/>
        </div>
        <p id="s1Err" class="err-msg"></p>
        <button class="btn-primary" onclick="goStep2()">다음 단계</button>
      </div>
    </div>

    <!-- ── STEP 2: 체형/스타일 정보 ── -->
    <div class="step-panel" id="step2">
      <div class="space-y-5">
        <div>
          <p class="field-label">성별</p>
          <div class="select-group">
            <div class="sel-btn" onclick="selectGender('male',this)">남성</div>
            <div class="sel-btn" onclick="selectGender('female',this)">여성</div>
            <div class="sel-btn" onclick="selectGender('other',this)">기타</div>
          </div>
        </div>
        <div>
          <p class="field-label">연령대</p>
          <div class="select-group flex-wrap" style="flex-wrap:wrap">
            <div class="sel-btn" onclick="selectAge('10s',this)">10대</div>
            <div class="sel-btn" onclick="selectAge('20s',this)">20대</div>
            <div class="sel-btn" onclick="selectAge('30s',this)">30대</div>
            <div class="sel-btn" onclick="selectAge('40s',this)">40대</div>
            <div class="sel-btn" onclick="selectAge('50s+',this)">50대+</div>
          </div>
        </div>
        <div class="flex gap-4">
          <div class="flex-1">
            <p class="field-label">키 (cm)</p>
            <input id="s2_height" type="number" class="input-field" placeholder="170"/>
          </div>
          <div class="flex-1">
            <p class="field-label">몸무게 (kg)</p>
            <input id="s2_weight" type="number" class="input-field" placeholder="65"/>
          </div>
        </div>
        <p id="s2Err" class="err-msg"></p>

        <div class="flex gap-3 mt-2">
          <button onclick="goStep1()" class="sel-btn" style="flex:.8">
            <span class="material-symbols-outlined text-sm align-middle">arrow_back</span> 이전
          </button>
          <button class="btn-primary" style="flex:2" onclick="doSignup()">가입 완료</button>
        </div>
      </div>
    </div>

  </div>

  <a href="login.html" class="mt-6 flex items-center gap-1 text-sm text-white/40 hover:text-white/70 transition-colors">
    이미 계정이 있으신가요? <strong style="color:#97FEED" class="ml-1">로그인</strong>
  </a>
</div>

<script src="codibank.js"></script>
<script>
  // 이미 로그인된 경우
  if (window.CodiBank && window.CodiBank.getCurrentUser && window.CodiBank.getCurrentUser()) {
    location.replace('closet.html');
  }

  let selectedGender  = '';
  let selectedAgeGroup = '';

  function selectGender(val, el) {
    selectedGender = val;
    document.querySelectorAll('#step2 .sel-btn').forEach(b => {
      if (['male','female','other'].some(g => b.textContent.includes({male:'남성',female:'여성',other:'기타'}[g]) && g === val)) b.classList.add('active');
      else if (['남성','여성','기타'].includes(b.textContent.trim())) b.classList.remove('active');
    });
    el.classList.add('active');
  }

  function selectAge(val, el) {
    selectedAgeGroup = val;
    ['10대','20대','30대','40대','50대+'].forEach(txt => {
      document.querySelectorAll('#step2 .sel-btn').forEach(b => {
        if (b.textContent.trim() === txt) b.classList.remove('active');
      });
    });
    el.classList.add('active');
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
  }
  function clearErr(id) { document.getElementById(id).classList.remove('show'); }

  function goStep2() {
    clearErr('s1Err');
    const email = document.getElementById('s1_email').value.trim();
    const pw    = document.getElementById('s1_pw').value;
    const pw2   = document.getElementById('s1_pw2').value;
    const phone = document.getElementById('s1_phone').value.trim();

    if (!email)        return showErr('s1Err','이메일을 입력해주세요.');
    if (!pw)           return showErr('s1Err','비밀번호를 입력해주세요.');
    if (pw !== pw2)    return showErr('s1Err','비밀번호가 일치하지 않습니다.');
    if (!phone)        return showErr('s1Err','휴대폰 번호를 입력해주세요.');

    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    document.getElementById('dot1').classList.remove('active');
    document.getElementById('dot2').classList.add('active');
    document.getElementById('stepLabel').textContent = 'STEP 2 / 2 — 체형 정보';
  }

  function goStep1() {
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    document.getElementById('dot2').classList.remove('active');
    document.getElementById('dot1').classList.add('active');
    document.getElementById('stepLabel').textContent = 'STEP 1 / 2 — 계정 정보';
  }

  function doSignup() {
    clearErr('s2Err');
    const payload = {
      email:    document.getElementById('s1_email').value.trim(),
      password: document.getElementById('s1_pw').value,
      phone:    document.getElementById('s1_phone').value.trim(),
      gender:   selectedGender,
      ageGroup: selectedAgeGroup,
      height:   document.getElementById('s2_height').value,
      weight:   document.getElementById('s2_weight').value,
    };
    const res = window.CodiBank.signup(payload);
    if (res.ok) {
      location.replace('closet.html');
    } else {
      showErr('s2Err', res.error || '회원가입에 실패했습니다.');
    }
  }
</script>
</body>
</html>
