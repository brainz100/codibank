<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>CODIBANK - 회원가입</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    min-height:100dvh;width:100%;
    background:#071952;color:#fff;
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .bg-mesh{
    background:
      radial-gradient(at 0% 0%,rgba(11,102,106,.30) 0px,transparent 55%),
      radial-gradient(at 100% 100%,rgba(53,162,159,.20) 0px,transparent 55%),
      #071952;
    min-height:100dvh;
  }
  .card{
    background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.04) 100%);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.13);
    border-radius:28px;padding:32px 28px;
    width:100%;max-width:440px;
  }
  .field-label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.04em;margin-bottom:6px;}
  .input{
    width:100%;background:rgba(255,255,255,.07);
    border:1.5px solid rgba(255,255,255,.16);border-radius:14px;
    padding:14px 16px;color:#fff;font-size:15px;outline:none;
    font-family:inherit;transition:border-color .2s;-webkit-appearance:none;
  }
  .input:focus{border-color:#97FEED;}
  .input::placeholder{color:rgba(255,255,255,.32);}
  .btn-primary{
    width:100%;padding:16px;border:none;border-radius:16px;cursor:pointer;
    background:linear-gradient(135deg,#0B666A,#35A29F);
    color:#fff;font-size:17px;font-weight:800;font-family:inherit;
    transition:transform .14s;
  }
  .btn-primary:active{transform:scale(.97);}
  .btn-ghost{
    flex:1;padding:14px 8px;border-radius:14px;cursor:pointer;
    border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);
    color:rgba(255,255,255,.6);font-size:14px;font-weight:600;font-family:inherit;
    transition:all .2s;
  }
  .btn-ghost:hover{background:rgba(255,255,255,.1);}
  .sel-group{display:flex;gap:8px;flex-wrap:wrap;}
  .sel-btn{
    flex:1;min-width:60px;padding:11px 6px;border-radius:12px;cursor:pointer;
    border:1.5px solid rgba(255,255,255,.16);background:rgba(255,255,255,.05);
    color:rgba(255,255,255,.55);font-size:13px;font-weight:600;font-family:inherit;
    text-align:center;transition:all .18s;
  }
  .sel-btn.active{border-color:#97FEED;background:rgba(151,254,237,.13);color:#97FEED;}
  .step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .25s;}
  .step-dot.active{background:#97FEED;}
  .err{color:#ff6b6b;font-size:13px;display:none;margin-top:6px;}
  .err.show{display:block;}
  .panel{display:none;}
  .panel.active{display:flex;flex-direction:column;gap:16px;}
  .link-teal{color:#97FEED;font-weight:700;text-decoration:none;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── CodiBank 공통 풋바 ── */
.cb-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
  background: rgba(7,25,82,0.94);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-bottom: env(safe-area-inset-bottom);
}
.cb-nav-inner {
  display: flex; justify-content: space-between; align-items: flex-end;
  max-width: 480px; margin: 0 auto;
  padding: 10px 4px 6px;
}
.cb-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: rgba(255,255,255,0.38); text-decoration: none;
  font-size: 10px; font-weight: 600; letter-spacing: -.01em;
  padding: 0 2px; transition: color .18s;
  font-family: 'Pretendard','Noto Sans KR',sans-serif;
}
.cb-nav-item .cb-icon { font-size: 24px; font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24; }
.cb-nav-item.cb-active { color: #97FEED; }
.cb-nav-item.cb-active .cb-icon { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.cb-nav-center {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  margin-bottom: 4px;
}
.cb-nav-plus-btn {
  width: 54px; height: 54px; border-radius: 50%;
  background: #97FEED;
  display: flex; align-items: center; justify-content: center;
  position: relative; top: -14px;
  box-shadow: 0 0 22px rgba(151,254,237,0.45);
  border: 4px solid #071952;
  cursor: pointer; text-decoration: none;
  transition: transform .15s;
}
.cb-nav-plus-btn:active { transform: scale(.92); }
.cb-nav-plus-btn .material-symbols-outlined {
  color: #071952; font-size: 28px;
  font-variation-settings: 'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;
}
.cb-nav-plus-label {
  color: #97FEED; font-size: 10px; font-weight: 700;
  margin-top: -10px; letter-spacing: -.01em;
  font-family: 'Pretendard','Noto Sans KR',sans-serif;
}
.cb-nav-spacer { height: 76px; }

</style>
</head>
<body class="bg-mesh">
<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 100px;">

  <a href="../index.html" style="font-size:28px;font-weight:900;letter-spacing:-.04em;color:#fff;text-decoration:none;margin-bottom:32px;">
    CODI<span style="color:#97FEED">BANK</span>
  </a>

  <div class="card">
    <!-- 헤더 -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <div>
        <h2 style="font-size:24px;font-weight:800;margin-bottom:3px;">회원가입</h2>
        <p id="stepLabel" style="font-size:13px;color:rgba(255,255,255,.45);">STEP 1 / 2 — 계정 정보</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
      </div>
    </div>

    <!-- STEP 1 -->
    <div class="panel active" id="step1">
      <div>
        <label class="field-label">이메일 (아이디)</label>
        <input id="s1_email" type="email" class="input" placeholder="example@email.com"/>
      </div>
      <div>
        <label class="field-label">비밀번호 (영문+숫자 4자 이상)</label>
        <input id="s1_pw" type="password" class="input" placeholder="비밀번호"/>
      </div>
      <div>
        <label class="field-label">비밀번호 확인</label>
        <input id="s1_pw2" type="password" class="input" placeholder="비밀번호 재입력"/>
      </div>
      <div>
        <label class="field-label">휴대폰 번호</label>
        <input id="s1_phone" type="tel" class="input" placeholder="010-0000-0000"/>
      </div>
      <p id="s1Err" class="err"></p>
      <button class="btn-primary" onclick="goStep2()">다음 단계 →</button>
    </div>

    <!-- STEP 2 -->
    <div class="panel" id="step2">
      <div>
        <label class="field-label">성별</label>
        <div class="sel-group">
          <button class="sel-btn" onclick="selGender('male',this)">남성</button>
          <button class="sel-btn" onclick="selGender('female',this)">여성</button>
          <button class="sel-btn" onclick="selGender('other',this)">기타</button>
        </div>
      </div>
      <div>
        <label class="field-label">연령대</label>
        <div class="sel-group">
          <button class="sel-btn" onclick="selAge('10s',this)">10대</button>
          <button class="sel-btn" onclick="selAge('20s',this)">20대</button>
          <button class="sel-btn" onclick="selAge('30s',this)">30대</button>
          <button class="sel-btn" onclick="selAge('40s',this)">40대</button>
          <button class="sel-btn" onclick="selAge('50s+',this)">50대+</button>
        </div>
      </div>
      <div class="row-2">
        <div>
          <label class="field-label">키 (cm)</label>
          <input id="s2_height" type="number" class="input" placeholder="170"/>
        </div>
        <div>
          <label class="field-label">몸무게 (kg)</label>
          <input id="s2_weight" type="number" class="input" placeholder="65"/>
        </div>
      </div>
      <p id="s2Err" class="err"></p>
      <div style="display:flex;gap:10px;">
        <button class="btn-ghost" onclick="goStep1()">← 이전</button>
        <button class="btn-primary" style="flex:2;" onclick="doSignup()">가입 완료</button>
      </div>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,.38);">
      이미 계정이 있으신가요? <a href="login.html" class="link-teal">로그인</a>
    </p>
  </div>
</div>


<!-- ── CodiBank 공통 풋바 ── -->
<nav class="cb-nav" aria-label="하단 네비게이션">
  <div class="cb-nav-inner">
    <a href="closet.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">grid_view</span>
      <span>내옷장</span>
    </a>
    <a href="album.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">auto_awesome_motion</span>
      <span>코디앨범</span>
    </a>
    <div class="cb-nav-center">
      <a href="camera.html" class="cb-nav-plus-btn">
        <span class="material-symbols-outlined">add</span>
      </a>
      <span class="cb-nav-plus-label">ITEM등록</span>
    </div>
    <a href="share-sale.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">local_mall</span>
      <span>공유판매</span>
    </a>
    <a href="mypage.html" class="cb-nav-item cb-active">
      <span class="material-symbols-outlined cb-icon">person_outline</span>
      <span>MY</span>
    </a>
  </div>
</nav>
<div class="cb-nav-spacer"></div>


<script src="codibank.js"></script>
<script>
  if(window.CodiBank&&window.CodiBank.getCurrentUser&&window.CodiBank.getCurrentUser())
    location.replace('closet.html');

  let selGenderVal='', selAgeVal='';

  function selGender(v,el){
    selGenderVal=v;
    el.closest('.sel-group').querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  }
  function selAge(v,el){
    selAgeVal=v;
    el.closest('.sel-group').querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
  }
  function showErr(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('show');}
  function clearErr(id){document.getElementById(id).classList.remove('show');}

  function goStep2(){
    clearErr('s1Err');
    const email=document.getElementById('s1_email').value.trim();
    const pw=document.getElementById('s1_pw').value;
    const pw2=document.getElementById('s1_pw2').value;
    const phone=document.getElementById('s1_phone').value.trim();
    if(!email)return showErr('s1Err','이메일을 입력해주세요.');
    if(!pw)return showErr('s1Err','비밀번호를 입력해주세요.');
    if(pw!==pw2)return showErr('s1Err','비밀번호가 일치하지 않습니다.');
    if(!phone)return showErr('s1Err','휴대폰 번호를 입력해주세요.');
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    document.getElementById('dot1').classList.remove('active');
    document.getElementById('dot2').classList.add('active');
    document.getElementById('stepLabel').textContent='STEP 2 / 2 — 체형 정보';
  }
  function goStep1(){
    document.getElementById('step2').classList.remove('active');
    document.getElementById('step1').classList.add('active');
    document.getElementById('dot2').classList.remove('active');
    document.getElementById('dot1').classList.add('active');
    document.getElementById('stepLabel').textContent='STEP 1 / 2 — 계정 정보';
  }
  function doSignup(){
    clearErr('s2Err');
    const res=window.CodiBank.signup({
      email:document.getElementById('s1_email').value.trim(),
      password:document.getElementById('s1_pw').value,
      phone:document.getElementById('s1_phone').value.trim(),
      gender:selGenderVal,
      ageGroup:selAgeVal,
      height:document.getElementById('s2_height').value,
      weight:document.getElementById('s2_weight').value,
    });
    if(res.ok)location.replace('closet.html');
    else showErr('s2Err',res.error||'회원가입에 실패했습니다.');
  }
</script>
</body>
</html>
