<style>html{visibility:hidden}

/* ════ CodiBank 공통 풋바 (확정판) ════ */
.cb-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 99999;
  background: #071952;
  border-top: 2px solid rgba(151,254,237,0.18);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.cb-nav-inner {
  display: flex; justify-content: space-between; align-items: flex-end;
  max-width: 480px; margin: 0 auto;
  padding: 10px 8px 8px; height: 64px;
}
.cb-nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px;
  color: rgba(255,255,255,0.35); text-decoration: none;
  font-size: 10px; font-weight: 700; letter-spacing: -.01em;
  font-family: 'Pretendard','Noto Sans KR','Outfit',sans-serif;
  transition: color .15s;
}
.cb-nav-tab .ni {
  font-family: 'Material Symbols Outlined';
  font-size: 24px; line-height: 1;
  font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
}
.cb-nav-tab.on { color: #97FEED; }
.cb-nav-tab.on .ni { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

.cb-nav-add-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding-bottom: 2px;
}
.cb-nav-add {
  width: 52px; height: 52px; border-radius: 50%;
  background: #97FEED;
  display: flex; align-items: center; justify-content: center;
  position: relative; top: -12px;
  box-shadow: 0 0 20px rgba(151,254,237,0.5);
  border: 4px solid #071952;
  text-decoration: none;
  font-family: 'Material Symbols Outlined';
  font-size: 26px; color: #071952; line-height: 1;
  font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24;
  transition: transform .13s;
}
.cb-nav-add:active { transform: scale(.9); }
.cb-nav-add-lbl {
  color: #97FEED; font-size: 10px; font-weight: 800;
  margin-top: -8px;
  font-family: 'Pretendard','Noto Sans KR','Outfit',sans-serif;
}
.cb-spacer { height: 72px; }

</style>
