<script>
// ── CodiBank i18n 번역 사전 ──
(function(){
  var _T = {
    // 내비게이션
    "내옷장":"My Closet","코디앨범":"Codi Album","코디 앨범":"Codi Album",
    "ITEM등록":"Add Item","코디하기":"Codi Style",
    // 앨범 페이지
    "코디 앨범 - 코디뱅크":"Codi Album - CodiBank",
    "앨범 불러오는 중…":"Loading album…",
    "저장된 코디가 없어요":"No saved outfits yet",
    "내옷장에서 AI 코디를 추천받고":"Get AI outfit recommendations from My Closet",
    "저장하기를 눌러보세요!":"and tap Save!",
    "AI 코디 추천 받기":"Get AI Outfit",
    "전체삭제":"Delete All","저장일자":"By Date","좋아요":"Liked","코디목적":"By Purpose",
    "저장":"Save","공유":"Share","삭제":"Delete",
    "✓ 저장되었습니다":"✓ Saved",
  };
  window._cbI18n = _T;
  window.applyI18n = function(){
    if(!(window.CodiBankI18n && CodiBankI18n.isEn())) return;
    // 1) data-i18n 속성 직접 교체
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var k = el.getAttribute('data-i18n');
      if(_T[k]) el.textContent = _T[k];
    });
    // 2) 빈 상태 특수 처리 (innerHTML 포함)
    var sub = document.querySelector('[data-i18n-html="empty-sub"]');
    if(sub) sub.innerHTML = 'Get AI outfit recommendations from My Closet<br/>and tap Save!';
    // 3) 텍스트 노드 순회 번역
    var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
    var node;
    while((node = walker.nextNode())){
      var txt = (node.nodeValue||'').trim();
      if(txt && _T[txt]) node.nodeValue = node.nodeValue.replace(txt, _T[txt]);
    }
    // 4) title
    var t = document.querySelector('title');
    if(t && _T[t.textContent.trim()]) t.textContent = _T[t.textContent.trim()];
    // 5) select option 번역
    var sel = document.getElementById('sortSel');
    if(sel){ var opts=sel.querySelectorAll('option'); opts.forEach(function(o){ if(_T[o.textContent.trim()]) o.textContent=_T[o.textContent.trim()]; }); }
    // 6) lang
    document.documentElement.setAttribute('lang','en');
  };
  // 언어 전환 감지
  var _ll = localStorage.getItem('cb_lang')||'ko';
  setInterval(function(){
    var cur = localStorage.getItem('cb_lang')||'ko';
    if(cur!==_ll){_ll=cur; setTimeout(applyI18n,100);}
  },500);
  if(window.CodiBankI18n && CodiBankI18n.setLang){
    var _orig = CodiBankI18n.setLang.bind(CodiBankI18n);
    CodiBankI18n.setLang=function(lang){_orig(lang); setTimeout(applyI18n,150);};
  } else {
    var _pt=setInterval(function(){
      if(window.CodiBankI18n && CodiBankI18n.setLang){
        var _o=CodiBankI18n.setLang.bind(CodiBankI18n);
        CodiBankI18n.setLang=function(lang){_o(lang);setTimeout(applyI18n,150);};
        clearInterval(_pt);
      }
    },300);
  }
})();
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",function(){setTimeout(applyI18n,200);});}else{setTimeout(applyI18n,200);}
</script>

<script>
'use strict';
let _user = null, _entries = [], _cur = null;

function fmt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  // 타이틀 i18n
  const _albumTitleEl = document.getElementById('albumTitle');
  if(_albumTitleEl && window.CodiBankI18n && CodiBankI18n.isEn()) _albumTitleEl.textContent = 'Codi Album';
  if (window.CodiBankI18n && CodiBankI18n.isEn()) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return `${months[d.getMonth()]} ${d.getDate()} (${days[d.getDay()]})`;
  }
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

var PURPOSE_EN = {'출퇴근':'Commute','비즈니스':'Business','주말외출':'Weekend','주말여행':'Weekend Trip','국내여행':'Domestic Trip','해외여행':'Overseas Trip','지인모임':'Social','소개팅':'Blind Date','파티룩':'Party','맞춤':'Custom','코디':'Outfit'};
function tPurpose(label) {
  if (!label) return (window.CodiBankI18n && CodiBankI18n.isEn()) ? 'Outfit' : '코디';
  if (window.CodiBankI18n && CodiBankI18n.isEn()) return PURPOSE_EN[label] || label;
  return label;
}

async function resolveImg(ref) {
  if (!ref) return '';
  const r = String(ref);
  // 완전한 URL이면 그대로 사용
  if (r.startsWith('data:') || r.startsWith('blob:')) return r;
  // [2026-04-08 수정] 프론트엔드 URL(codibank.kr/uploads/)로 잘못 저장된 기존 데이터 자동 복구
  if (r.startsWith('http')) {
    try {
      const u = new URL(r);
      if (u.pathname.startsWith('/uploads/')) {
        const bb = (window.CODIBANK_CONFIG && window.CODIBANK_CONFIG.backendBase) || 'https://codibank-api.onrender.com';
        const bbHost = new URL(bb).host;
        if (u.host !== bbHost) {
          // 프론트엔드 호스트의 /uploads/ → 백엔드로 리다이렉트
          return bb + u.pathname;
        }
      }
    } catch(_) {}
    return r;
  }
  // /uploads/ 상대경로 → 백엔드(Render) 절대 URL로 변환
  if (r.startsWith('/uploads/')) {
    const backendBase = (window.CODIBANK_CONFIG && window.CODIBANK_CONFIG.backendBase)
      ? window.CODIBANK_CONFIG.backendBase
      : 'https://codibank-api.onrender.com';
    return backendBase + r;
  }
  // CodiBank.getImageSrc 시도
  if (window.CodiBank && CodiBank.getImageSrc) {
    try { const s = await CodiBank.getImageSrc(r); if (s) return s; } catch(_) {}
  }
  return r;
}

function mkCard(entry) {
  const wrap = document.createElement('div');
  wrap.className = 'acard';
  const sName = entry.stylistName || '';
  const sCity = entry.stylistCity || '';
  const stylistText = sName ? (sName + (sCity ? ' · ' + sCity : '')) : '';
  const isLiked = entry.liked || false;
  wrap.innerHTML = `
    <div class="acard-img-wrap">
      <div class="acard-skeleton" id="sk_${entry.id}"></div>
      <div class="acard-placeholder" id="ph_${entry.id}" style="display:none;">
        <span class="material-symbols-outlined" style="font-size:32px;color:rgba(216,226,255,.1);">style</span>
      </div>
      <img id="img_${entry.id}" class="acard-img" src="" alt="" style="opacity:0;"/>
      <!-- 찜 상태 오버레이 (길게 누를 때 표시) -->
      <div class="like-overlay" id="lov_${entry.id}" style="display:none;">
        <span class="like-ov-emoji">${isLiked?'❤️':'🤍'}</span>
      </div>
      <!-- 찜 배지 (이미 찜한 경우 상단에 표시) -->
      ${isLiked ? '<div class="liked-badge" id="lbadge_'+entry.id+'">❤️</div>' : '<div class="liked-badge" id="lbadge_'+entry.id+'" style="display:none;">❤️</div>'}
    </div>
    <div class="acard-info">
      <p class="acard-date">${fmt(entry.createdAt)}</p>
      <p class="acard-purpose">${tPurpose(entry.purposeLabel)}</p>
      ${stylistText ? '<p class="acard-stylist">✦ ' + stylistText + '</p>' : ''}
    </div>
  `;
  // 길게 누르기(500ms) → 찜 / 짧은 탭 → 모달
  // ── 탭/클릭 → 상세 모달 / 길게 누르기(500ms) → 찜 / 스크롤은 무시 ──
  let _pt = null, _isLong = false, _startX = 0, _startY = 0, _moved = false;

  const _ts = (e) => {
    _isLong = false;
    _moved  = false;
    const t = e.touches ? e.touches[0] : e;
    _startX = t.clientX;
    _startY = t.clientY;
    // 길게 누르기 타이머 (500ms)
    _pt = setTimeout(() => {
      if(!_moved){          // 스크롤 중이면 무시
        _isLong = true;
        toggleLike(entry.id);
        if(navigator.vibrate) navigator.vibrate(30);
      }
    }, 500);
  };
  const _tm = (e) => {
    // 10px 이상 이동하면 스크롤로 판단 → 타이머 취소
    const t = e.touches ? e.touches[0] : e;
    const dx = Math.abs(t.clientX - _startX);
    const dy = Math.abs(t.clientY - _startY);
    if(dx > 10 || dy > 10){
      _moved = true;
      clearTimeout(_pt);
    }
  };
  const _te = (e) => {
    clearTimeout(_pt);
    if(_isLong){ _isLong = false; return; }  // 길게 누르기 완료
    if(_moved)  return;                        // 스크롤 → 무시
    // 짧은 탭 → 모달 오픈
    openModal(entry);
  };

  wrap.addEventListener('touchstart', _ts, {passive:true});
  wrap.addEventListener('touchmove',  _tm, {passive:true});
  wrap.addEventListener('touchend',   _te, {passive:true});
  wrap.addEventListener('click', () => { if(!_isLong && !_moved) openModal(entry); });
  wrap.addEventListener('contextmenu', (e) => e.preventDefault());
  resolveImg(entry.imageRef).then(src => {
    const img = document.getElementById('img_' + entry.id);
    const sk  = document.getElementById('sk_'  + entry.id);
    const ph  = document.getElementById('ph_'  + entry.id);
    if (!src) { if(sk) sk.style.display='none'; if(ph) ph.style.display='flex'; return; }
    if (!img) return;
    img.onload  = () => { img.style.opacity='1'; if(sk) sk.style.display='none'; };
    img.onerror = () => {
      // 이미지 로드 실패 시 백엔드 URL로 재시도
      if(!img.dataset.retried && !src.startsWith('data:')){
        img.dataset.retried = '1';
        const base = (window.CODIBANK_CONFIG && window.CODIBANK_CONFIG.backendBase)
          ? window.CODIBANK_CONFIG.backendBase : 'https://codibank-api.onrender.com';
        const alt = src.startsWith('/') ? base + src : src;
        if(alt !== src) { img.src = alt; return; }
      }
      if(sk) sk.style.display='none'; if(ph) ph.style.display='flex';
    };
    img.src = src;
  });
  return wrap;
}

async function render() {
  _user = window.CodiBank && CodiBank.getCurrentUser ? CodiBank.getCurrentUser() : null;
  if (!_user) { location.replace('login.html'); return; }
  _entries = (CodiBank.getAiAlbumEntries ? CodiBank.getAiAlbumEntries(_user.email) : []) || [];
  document.getElementById('loadEl').style.display = 'none';
  if (!_entries.length) {
    document.getElementById('emptyEl').style.display = 'flex';
    return;
  }
  const sortVal = (document.getElementById('sortSel') || {}).value || 'date';
  const sorted = sortEntries(_entries, sortVal);
  const grid = document.getElementById('grid');
  grid.style.display = 'grid';
  grid.innerHTML = '';
  sorted.forEach(e => grid.appendChild(mkCard(e)));
}

// 정렬 함수
function sortEntries(arr, mode) {
  const copy = [...arr];
  if (mode === 'liked') {
    // 좋아요한 것 먼저, 그 다음 날짜순
    copy.sort((a, b) => {
      if (!!b.liked !== !!a.liked) return b.liked ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
  } else if (mode === 'purpose') {
    // 코디목적 가나다순
    copy.sort((a, b) => {
      const pa = (a.purposeLabel || '').localeCompare(b.purposeLabel || '', 'ko');
      return pa !== 0 ? pa : (b.createdAt || 0) - (a.createdAt || 0);
    });
  } else {
    // 저장일자 최신순 (기본)
    copy.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  }
  return copy;
}

// 정렬 변경 시 호출
function applySort(val) {
  if (!_entries || !_entries.length) return;
  const sorted = sortEntries(_entries, val);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  sorted.forEach(e => grid.appendChild(mkCard(e)));
}

function delEntry(id) {
  if (!confirm('이 코디를 삭제할까요?')) return;
  CodiBank.deleteAiAlbumEntry && CodiBank.deleteAiAlbumEntry(_user.email, id);
  closeModal();
  render();
}
function clearAll() {
  if (!confirm(`저장된 코디 ${_entries.length}장을 모두 삭제할까요?`)) return;
  _entries.forEach(e => CodiBank.deleteAiAlbumEntry && CodiBank.deleteAiAlbumEntry(_user.email, e.id));
  render();
}

async function openModal(entry) {
  _cur = entry;
  const modal = document.getElementById('modal');
  const img = document.getElementById('mImg');
  document.getElementById('mDate').textContent    = fmt(entry.createdAt);
  document.getElementById('mPurpose').textContent = tPurpose(entry.purposeLabel);
  // 날씨 표시
  var _wxEl = document.getElementById('mWeather');
  if(_wxEl){
    var _wxTxt = '';
    if(entry.weatherText) _wxTxt = entry.weatherText;
    if(entry.temp != null) _wxTxt += ' ' + entry.temp + '°';
    _wxEl.textContent = _wxTxt;
  }
  // 분석 내용 전문 표시
  var _sumSec = document.getElementById('mSummarySection');
  var _sumEl = document.getElementById('mSummary');
  if(_sumSec && _sumEl){
    var _explain = entry.explanation || entry.styleTitle || '';
    if(_explain && _explain.length > 5){
      _sumEl.textContent = _explain;
      _sumSec.style.display = 'block';
    } else { _sumSec.style.display = 'none'; }
  }
  const kwSec = document.getElementById('mKeywordSection');
  const kwWrap = document.getElementById('mKeywords');
  const kws = Array.isArray(entry.keywords) ? entry.keywords.filter(Boolean) : [];
  if (kws.length) {
    kwWrap.innerHTML = kws.map(k => `<span class="kw-chip">${k}</span>`).join('');
    kwSec.style.display = 'block';
  } else { kwSec.style.display = 'none'; }
  img.style.opacity = '0';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  var _nav = document.querySelector('.cb-nav'); if(_nav) _nav.style.display = 'none';
  const src = await resolveImg(entry.imageRef);
  if (src) { img.onload = () => { img.style.opacity = '1'; }; img.src = src; }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
  var _nav = document.querySelector('.cb-nav'); if(_nav) _nav.style.display = '';
  _cur = null;
}

async function doDownload() {
  if (!_cur) return;
  const src = await resolveImg(_cur.imageRef);
  if (!src) { alert('이미지를 불러올 수 없습니다.'); return; }
  try {
    const res = await fetch(src);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'codibank_' + Date.now() + '.jpg'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  } catch(e) {
    // fetch 실패 시 직접 링크 폴백
    const a = document.createElement('a'); a.href = src; a.download = 'codibank.jpg'; a.click();
  }
}
async function doShare() {
  if (!_cur) return;
  const src = await resolveImg(_cur.imageRef);
  if (navigator.share && src) {
    try {
      const res = await fetch(src); const blob = await res.blob();
      const f = new File([blob], 'codibank.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [f] })) {
        await navigator.share({ title: '코디뱅크 AI 추천 코디', files: [f] }); return;
      }
    } catch(e) {}
  }
  doDownload();
}
function doDelete() { if (_cur) delEntry(_cur.id); }

// ── 좋아요 토글 ──
// ── 올바른 키(codibank_ai_album_v1)로 찜 토글 ──
const ALBUM_KEY = 'codibank_ai_album_v1';
function toggleLike(entryId) {
  try {
    // CodiBank 실제 저장 키 사용
    const all = JSON.parse(localStorage.getItem(ALBUM_KEY) || '[]');
    const idx = all.findIndex(e => e.id === entryId);
    if (idx < 0) return;
    all[idx].liked = !all[idx].liked;
    const liked = all[idx].liked;
    localStorage.setItem(ALBUM_KEY, JSON.stringify(all));
    // _entries 동기화
    const ei = _entries.findIndex(e => e.id === entryId);
    if (ei >= 0) _entries[ei].liked = liked;
    // UI 업데이트
    const badge = document.getElementById('lbadge_' + entryId);
    const lov   = document.getElementById('lov_' + entryId);
    if (badge) badge.style.display = liked ? '' : 'none';
    // 오버레이 이모티콘 업데이트 후 0.7초 뒤 숨김
    if (lov) {
      const em = lov.querySelector('.like-ov-emoji');
      if (em) em.textContent = liked ? '❤️' : '🤍';
      lov.style.display = 'flex';
      setTimeout(() => { lov.style.display = 'none'; }, 700);
    }
    return liked;
  } catch(e) { console.warn('toggleLike error:', e); return false; }
}

document.addEventListener('DOMContentLoaded', render);

// 탭/앱 전환 후 복귀 시 앨범 재렌더링 (이미지가 사라진 경우 복원)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible'){
    // 이미지 src가 빈 경우에만 재렌더링
    var emptyImgs = document.querySelectorAll('.acard-img[src=""]');
    if(emptyImgs.length > 0) render();
  }
});

// pageshow: bfcache에서 복귀 시
window.addEventListener('pageshow', function(e){
  if(e.persisted) render();
});
</script>
