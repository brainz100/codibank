<head>

<style>html{visibility:hidden}</style>
<script>
(function(){
  try{
    var s=localStorage.getItem('codibank_session');
    if(!s){ window.location.replace('login.html'); }
    else { document.documentElement.style.visibility='visible'; }
  }catch(e){ document.documentElement.style.visibility='visible'; }
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100dvh;background:#07132a;color:#d8e2ff;font-family:'Inter','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulseGlow{0%,100%{opacity:.25}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 헤더: Glassmorphic ── */
.hdr{position:sticky;top:0;z-index:100;background:rgba(7,19,42,0.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);padding:14px 24px;display:flex;align-items:center;justify-content:center;}
.hdr-title{font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;color:#4cdbce;letter-spacing:.18em;text-transform:uppercase;}
.hdr-badge{position:absolute;right:80px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:rgba(216,226,255,.45);letter-spacing:.04em;}

/* ── 로딩 / 빈 상태 ── */
.center-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;padding:32px 24px;text-align:center;}
.empty-icon-wrap{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,rgba(76,219,206,.12),rgba(19,187,175,.08));display:flex;align-items:center;justify-content:center;}
.empty-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:800;color:rgba(216,226,255,.9);margin-bottom:6px;}
.empty-sub{font-size:13px;color:rgba(216,226,255,.35);line-height:1.7;}
.empty-cta{margin-top:8px;padding:14px 32px;border-radius:9999px;font-size:13px;font-weight:700;background:linear-gradient(135deg,#4cdbce,#13bbaf);color:#003733;text-decoration:none;display:flex;align-items:center;gap:8px;box-shadow:0 12px 32px rgba(76,219,206,.25);transition:transform .15s;font-family:'Inter',sans-serif;}
.empty-cta:active{transform:scale(.96);}

/* ── 그리드 ── */
.album-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:16px 20px;animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;}

/* ── 카드 ── */
.acard{background:rgba(20,31,55,.6);border-radius:1rem;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;}
.acard:active{transform:scale(.97);}
.acard-img-wrap{position:relative;width:100%;aspect-ratio:10/16;background:#0f1b32;overflow:hidden;}
.acard-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s;}
.acard-skeleton{position:absolute;inset:0;z-index:1;background:linear-gradient(90deg,rgba(216,226,255,.03) 0%,rgba(216,226,255,.08) 50%,rgba(216,226,255,.03) 100%);background-size:200% 100%;animation:shimmer 1.4s infinite linear;}
.acard-placeholder{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
.acard-info{padding:10px 12px 14px;}
.acard-date{font-size:10px;font-weight:600;color:rgba(216,226,255,.4);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.acard-purpose{font-family:'Manrope',sans-serif;font-size:14px;font-weight:800;color:#d8e2ff;line-height:1.2;}
.acard-stylist{font-size:9px;font-weight:600;color:rgba(151,254,237,.6);margin-top:3px;letter-spacing:.03em;}
.acard-like{position:absolute;top:8px;right:8px;width:40px;height:40px;background:none !important;border:none;outline:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;padding:0;-webkit-tap-highlight-color:transparent;}
.acard-like .material-symbols-outlined{font-size:28px;font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;color:rgba(255,255,255,.8);filter:drop-shadow(0 1px 4px rgba(0,0,0,.7));transition:all .25s;pointer-events:none;}
.acard-like.liked .material-symbols-outlined{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;color:#C8385E;filter:drop-shadow(0 1px 3px rgba(200,56,94,.5));}

/* ── 모달: 전체화면 ── */
.modal-bg{position:fixed;inset:0;z-index:500;background:#07132a;display:flex;flex-direction:column;overflow:hidden;}
.modal-scroll{width:100%;max-width:520px;margin:0 auto;overflow-y:auto;flex:1;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch;}

/* 모달 이미지 */
.modal-img-section{position:relative;padding:0 20px;margin-top:16px;flex-shrink:0;}
.modal-img-glow{position:absolute;inset:-4px;background:linear-gradient(180deg,rgba(76,219,206,.15),transparent 60%);border-radius:2rem;filter:blur(1px);opacity:.4;animation:pulseGlow 3s ease-in-out infinite;pointer-events:none;}
.modal-img-card{position:relative;border-radius:1rem;overflow:hidden;background:#0f1b32;box-shadow:0 32px 64px -12px rgba(2,13,36,.5);}
.modal-img{width:100%;aspect-ratio:10/16;max-height:52dvh;object-fit:contain;display:block;background:#0f1b32;}
.modal-close{position:absolute;top:12px;right:12px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(7,19,42,.6);backdrop-filter:blur(16px);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.modal-close:active{background:rgba(7,19,42,.9);}

/* 모달 정보 */
.modal-body{padding:20px 24px 12px;flex-shrink:0;}
.modal-title-row{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;}
.modal-purpose{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800;color:#d8e2ff;letter-spacing:-.02em;}
.modal-date{font-size:11px;font-weight:500;color:rgba(216,226,255,.4);letter-spacing:.06em;text-transform:uppercase;}
.modal-keywords{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.kw-chip{padding:6px 14px;border-radius:9999px;font-size:11px;font-weight:600;background:rgba(15,27,50,.8);border:1px solid rgba(60,73,71,.2);color:rgba(187,202,199,.9);white-space:nowrap;}

/* 버튼 */
.modal-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 24px 28px;}
.btn-save{padding:14px 8px;border-radius:9999px;background:linear-gradient(135deg,#4cdbce,#13bbaf);color:#003733;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-family:'Inter',sans-serif;border:none;box-shadow:0 8px 24px rgba(76,219,206,.3);transition:transform .13s;}
.btn-save:active{transform:scale(.95);}
.btn-share{padding:14px 8px;border-radius:9999px;background:rgba(52,74,104,.6);color:rgba(163,186,221,.95);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:all .15s;}
.btn-share:active{background:rgba(52,74,104,.9);}
.btn-del{padding:14px 8px;border-radius:9999px;background:rgba(30,42,66,.6);border:1px solid rgba(255,180,171,.15);color:rgba(255,180,171,.85);font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
.btn-del:active{background:rgba(147,0,10,.15);}

/* ── 풋바: Floating Glassmorphic Bar ── */
.cb-nav{position:fixed;bottom:0;left:0;right:0;z-index:99999;padding:0 16px 10px;pointer-events:none;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.cb-nav-inner{pointer-events:all;max-width:400px;margin:0 auto;height:62px;border-radius:9999px;background:rgba(7,19,42,.55);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:0 24px 48px -8px rgba(2,13,36,.45);display:flex;justify-content:space-around;align-items:center;padding:0 6px;}
.cb-nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(216,226,255,.4);text-decoration:none;padding:6px 12px;border-radius:9999px;transition:all .2s;font-family:'Inter','Noto Sans KR',sans-serif;}
.cb-nav-tab .ni{font-family:'Material Symbols Outlined';font-size:22px;line-height:1;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 22;}
.cb-nav-tab .nl{font-size:9px;font-weight:600;letter-spacing:.02em;}
.cb-nav-tab.on{color:#07132a;background:linear-gradient(135deg,#4cdbce,#13bbaf);padding:6px 16px;}
.cb-nav-tab.on .ni{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 22;}
.cb-spacer{height:82px;}

/* 전체삭제 */
.clear-btn{font-size:10px;font-weight:600;color:rgba(255,180,171,.6);background:none;border:none;padding:6px 12px;border-radius:9999px;cursor:pointer;position:absolute;right:20px;}
</style>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#07132a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CodiBank"/>
<link rel="apple-touch-icon" href="/app/icons/icon-192.png"/>
<script src="pwa-register.js" defer></script>
</head>
<body>

<!-- 헤더 -->
<header class="hdr">
  <h1 class="hdr-title">Digital Atelier</h1>
  <span id="cntBadge" class="hdr-badge"></span>
  <button id="clearBtn" class="clear-btn" style="display:none;" onclick="clearAll()">전체삭제</button>
</header>

<!-- 로딩 -->
<div id="loadEl" class="center-state">
  <div style="width:36px;height:36px;border:2px solid rgba(76,219,206,.12);border-top-color:#4cdbce;border-radius:50%;animation:spin .8s linear infinite;"></div>
  <p style="font-size:12px;color:rgba(216,226,255,.35);font-weight:500;">앨범 불러오는 중…</p>
</div>

<!-- 빈 상태 -->
<div id="emptyEl" class="center-state" style="display:none;">
  <div class="empty-icon-wrap">
    <span class="material-symbols-outlined" style="font-size:40px;color:#4cdbce;font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 40;">style</span>
  </div>
  <div>
    <p class="empty-title">저장된 코디가 없어요</p>
    <p class="empty-sub">내옷장에서 AI 코디를 추천받고<br/>저장하기를 눌러보세요!</p>
  </div>
  <a href="closet.html" class="empty-cta">
    <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 16;">psychology</span>
    AI 코디 추천 받기
  </a>
</div>

<!-- 앨범 그리드 -->
<div id="grid" class="album-grid" style="display:none;"></div>

<div class="cb-spacer"></div>

<!-- 상세 모달 -->
<div id="modal" class="modal-bg" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal-scroll">
    <div class="modal-img-section">
      <div class="modal-img-glow"></div>
      <div class="modal-img-card">
        <button class="modal-close" onclick="closeModal()">
          <span class="material-symbols-outlined" style="color:rgba(216,226,255,.8);font-size:18px;">close</span>
        </button>
        <img id="mImg" class="modal-img" src="" alt=""/>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-title-row">
        <p id="mPurpose" class="modal-purpose"></p>
        <p id="mDate" class="modal-date"></p>
      </div>
      <div id="mKeywordSection" style="display:none;">
        <div id="mKeywords" class="modal-keywords"></div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-save" onclick="doDownload()">
        <span class="material-symbols-outlined" style="font-size:16px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 16;">bookmark</span>저장
      </button>
      <button class="btn-share" onclick="doShare()">
        <span class="material-symbols-outlined" style="font-size:16px;">share</span>공유
      </button>
      <button class="btn-del" onclick="doDelete()">
        <span class="material-symbols-outlined" style="font-size:16px;">delete</span>삭제
      </button>
    </div>
  </div>
</div>

<!-- 풋바 -->
<nav class="cb-nav">
  <div class="cb-nav-inner">
    <a href="closet.html" class="cb-nav-tab"><span class="ni">checkroom</span><span class="nl">내옷장</span></a>
    <a href="album.html" class="cb-nav-tab on"><span class="ni">collections</span><span class="nl">코디앨범</span></a>
    <a href="camera.html" class="cb-nav-tab"><span class="ni">add_circle</span><span class="nl">ITEM등록</span></a>
    <a href="codistyle.html" class="cb-nav-tab"><span class="ni">accessibility_new</span><span class="nl">코디하기</span></a>
    <a href="mypage.html" class="cb-nav-tab"><span class="ni">person</span><span class="nl">MY</span></a>
  </div>
</nav>

<script>
'use strict';
let _user = null, _entries = [], _cur = null;

function fmt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (window.CodiBankI18n && CodiBankI18n.isEn()) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    return `${months[d.getMonth()]} ${d.getDate()} (${days[d.getDay()]})`;
  }
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

var PURPOSE_EN = {'출퇴근':'Commute','비즈니스':'Business','주말외출':'Weekend','주말여행':'Weekend Trip','국내여행':'Domestic Trip','해외여행':'Overseas Trip','지인모임':'Social','소개팅':'Blind Date','파티룩':'Party','맞춤':'Custom','코디':'Outfit'};
function tPurpose(label) {
  if (!label) return (window.CodiBankI18n && CodiBankI18n.isEn()) ? 'Outfit' : '코디';
  if (window.CodiBankI18n && CodiBankI18n.isEn()) return PURPOSE_EN[label] || label;
  return label;
}

async function resolveImg(ref) {
  if (!ref) return '';
  const r = String(ref);
  if (r.startsWith('data:') || r.startsWith('blob:') || r.startsWith('http')) return r;
  if (r.startsWith('/uploads/')) return window.location.origin + r;
  if (window.CodiBank && CodiBank.getImageSrc) {
    try { const s = await CodiBank.getImageSrc(r); if (s) return s; } catch(_) {}
  }
  return r;
}

function mkCard(entry) {
  const wrap = document.createElement('div');
  wrap.className = 'acard';
  const sName = entry.stylistName || '';
  const sCity = entry.stylistCity || '';
  const stylistText = sName ? (sName + (sCity ? ' · ' + sCity : '')) : '';
  const isLiked = entry.liked || false;
  wrap.innerHTML = `
    <div class="acard-img-wrap">
      <div class="acard-skeleton" id="sk_${entry.id}"></div>
      <div class="acard-placeholder" id="ph_${entry.id}" style="display:none;">
        <span class="material-symbols-outlined" style="font-size:32px;color:rgba(216,226,255,.1);">style</span>
      </div>
      <img id="img_${entry.id}" class="acard-img" src="" alt="" style="opacity:0;"/>
      <button class="acard-like ${isLiked?'liked':''}" id="like_${entry.id}" onclick="event.stopPropagation();toggleLike('${entry.id}')">
        <span class="material-symbols-outlined">favorite</span>
      </button>
    </div>
    <div class="acard-info">
      <p class="acard-date">${fmt(entry.createdAt)}</p>
      <p class="acard-purpose">${tPurpose(entry.purposeLabel)}</p>
      ${stylistText ? '<p class="acard-stylist">✦ ' + stylistText + '</p>' : ''}
    </div>
  `;
  wrap.addEventListener('click', () => openModal(entry));
  resolveImg(entry.imageRef).then(src => {
    const img = document.getElementById('img_' + entry.id);
    const sk  = document.getElementById('sk_'  + entry.id);
    const ph  = document.getElementById('ph_'  + entry.id);
    if (!img) return;
    if (src) {
      img.onload = () => { img.style.opacity='1'; if(sk) sk.style.display='none'; };
      img.onerror = () => { if(sk) sk.style.display='none'; if(ph) ph.style.display='flex'; img.style.display='none'; };
      img.src = src;
    } else {
      if(sk) sk.style.display='none';
      if(ph) ph.style.display='flex';
      img.style.display='none';
    }
  });
  return wrap;
}

async function render() {
  _user = window.CodiBank && CodiBank.getCurrentUser ? CodiBank.getCurrentUser() : null;
  if (!_user) { location.replace('login.html'); return; }
  _entries = (CodiBank.getAiAlbumEntries ? CodiBank.getAiAlbumEntries(_user.email) : []) || [];
  document.getElementById('loadEl').style.display = 'none';
  if (!_entries.length) {
    document.getElementById('emptyEl').style.display = 'flex';
    document.getElementById('cntBadge').textContent = '0장';
    return;
  }
  document.getElementById('cntBadge').textContent = _entries.length + '장';
  document.getElementById('clearBtn').style.display = 'block';
  const grid = document.getElementById('grid');
  grid.style.display = 'grid';
  grid.innerHTML = '';
  _entries.forEach(e => grid.appendChild(mkCard(e)));
}

function delEntry(id) {
  if (!confirm('이 코디를 삭제할까요?')) return;
  CodiBank.deleteAiAlbumEntry && CodiBank.deleteAiAlbumEntry(_user.email, id);
  closeModal();
  render();
}
function clearAll() {
  if (!confirm(`저장된 코디 ${_entries.length}장을 모두 삭제할까요?`)) return;
  _entries.forEach(e => CodiBank.deleteAiAlbumEntry && CodiBank.deleteAiAlbumEntry(_user.email, e.id));
  render();
}

async function openModal(entry) {
  _cur = entry;
  const modal = document.getElementById('modal');
  const img = document.getElementById('mImg');
  document.getElementById('mDate').textContent    = fmt(entry.createdAt);
  document.getElementById('mPurpose').textContent = tPurpose(entry.purposeLabel);
  const kwSec = document.getElementById('mKeywordSection');
  const kwWrap = document.getElementById('mKeywords');
  const kws = Array.isArray(entry.keywords) ? entry.keywords.filter(Boolean) : [];
  if (kws.length) {
    kwWrap.innerHTML = kws.map(k => `<span class="kw-chip">${k}</span>`).join('');
    kwSec.style.display = 'block';
  } else { kwSec.style.display = 'none'; }
  img.style.opacity = '0';
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  const src = await resolveImg(entry.imageRef);
  if (src) { img.onload = () => { img.style.opacity = '1'; }; img.src = src; }
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
  _cur = null;
}

async function doDownload() {
  if (!_cur) return;
  const src = await resolveImg(_cur.imageRef);
  if (!src) { alert('이미지를 불러올 수 없습니다.'); return; }
  try {
    const res = await fetch(src);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'codibank_' + Date.now() + '.jpg'; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 3000);
  } catch(e) {
    // fetch 실패 시 직접 링크 폴백
    const a = document.createElement('a'); a.href = src; a.download = 'codibank.jpg'; a.click();
  }
}
async function doShare() {
  if (!_cur) return;
  const src = await resolveImg(_cur.imageRef);
  if (navigator.share && src) {
    try {
      const res = await fetch(src); const blob = await res.blob();
      const f = new File([blob], 'codibank.png', { type: 'image/png' });
      if (navigator.canShare && navigator.canShare({ files: [f] })) {
        await navigator.share({ title: '코디뱅크 AI 추천 코디', files: [f] }); return;
      }
    } catch(e) {}
  }
  doDownload();
}
function doDelete() { if (_cur) delEntry(_cur.id); }

// ── 좋아요 토글 ──
function toggleLike(entryId) {
  const user = CodiBank.getCurrentUser();
  if (!user || !user.email) return;
  const key = 'cb_album_' + user.email;
  try {
    const entries = JSON.parse(localStorage.getItem(key) || '[]');
    const idx = entries.findIndex(e => e.id === entryId);
    if (idx < 0) return;
    entries[idx].liked = !entries[idx].liked;
    localStorage.setItem(key, JSON.stringify(entries));
    const btn = document.getElementById('like_' + entryId);
    if (btn) {
      if (entries[idx].liked) {
        btn.classList.add('liked');
      } else {
        btn.classList.remove('liked');
      }
    }
  } catch(e) { console.warn('toggleLike error:', e); }
}

document.addEventListener('DOMContentLoaded', render);
</script>
