<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>CODIBANK - 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100dvh;width:100%;background:#071952;color:#fff;font-family:'Pretendard','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}
  .bg-mesh{background:radial-gradient(at 0% 0%,rgba(11,102,106,.30) 0px,transparent 55%),radial-gradient(at 100% 100%,rgba(53,162,159,.20) 0px,transparent 55%),#071952;min-height:100dvh;}
  .card{background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.04) 100%);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.13);border-radius:28px;padding:32px 28px;width:100%;max-width:420px;}
  .field-wrap{display:flex;flex-direction:column;gap:6px;}
  .field-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.04em;}
  .input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.16);border-radius:14px;padding:14px 16px;color:#fff;font-size:15px;outline:none;font-family:inherit;transition:border-color .2s;}
  .input:focus{border-color:#97FEED;}.input::placeholder{color:rgba(255,255,255,.32);}
  .btn-primary{width:100%;padding:16px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#0B666A,#35A29F);color:#fff;font-size:17px;font-weight:800;font-family:inherit;transition:transform .14s,filter .14s;}
  .btn-primary:active{transform:scale(.97);filter:brightness(.9);}
  .err{color:#ff6b6b;font-size:13px;display:none;}.err.show{display:block;}
  .link-teal{color:#97FEED;font-weight:700;text-decoration:none;}
  .back-link{display:inline-flex;align-items:center;gap:4px;color:rgba(255,255,255,.38);font-size:13px;text-decoration:none;transition:color .2s;}
  .back-link:hover{color:rgba(255,255,255,.7);}
  .mi{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}
  /* ── 풋바: Floating Glassmorphic Bar ── */
.cb-nav{position:fixed;bottom:0;left:0;right:0;z-index:99999;padding:0 16px 10px;pointer-events:none;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.cb-nav-inner{pointer-events:all;max-width:400px;margin:0 auto;height:62px;border-radius:9999px;background:rgba(7,19,42,.55);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);box-shadow:0 24px 48px -8px rgba(2,13,36,.45);display:flex;justify-content:space-around;align-items:center;padding:0 6px;}
.cb-nav-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:rgba(216,226,255,.4);text-decoration:none;padding:6px 12px;border-radius:9999px;transition:all .2s;font-family:'Inter','Noto Sans KR',sans-serif;}
.cb-nav-tab .ni{font-family:'Material Symbols Outlined';font-size:22px;line-height:1;font-variation-settings:'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 22;}
.cb-nav-tab .nl{font-size:9px;font-weight:600;letter-spacing:.02em;}
.cb-nav-tab.on{color:#07132a;background:linear-gradient(135deg,#4cdbce,#13bbaf);padding:6px 16px;}
.cb-nav-tab.on .ni{font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 22;}
.cb-spacer{height:82px;}
</style>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#07132a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CodiBank"/>
<link rel="apple-touch-icon" href="/app/icons/icon-192.png"/>
<script src="pwa-register.js" defer></script>
</head>
<body class="bg-mesh">
<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 100px;">

  <a href="../index.html" style="font-size:28px;font-weight:900;letter-spacing:-.04em;color:#fff;text-decoration:none;margin-bottom:32px;">
    CODI<span style="color:#97FEED">BANK</span>
  </a>

  <div class="card">
    <h2 style="font-size:24px;font-weight:800;margin-bottom:4px;">로그인</h2>
    <p style="font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;">코디뱅크 계정으로 시작하세요</p>

    <!-- 이메일 로그인 -->
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="field-wrap">
        <label class="field-label">이메일</label>
        <input id="email" type="email" class="input" placeholder="example@email.com"/>
      </div>
      <div class="field-wrap">
        <label class="field-label">비밀번호</label>
        <input id="password" type="password" class="input" placeholder="비밀번호"/>
      </div>
      <p id="loginErr" class="err"></p>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,.38);">
      계정이 없으신가요? <a href="signup.html" class="link-teal">회원가입</a>
    </p>
  </div>

  <a href="../index.html" class="back-link" style="margin-top:24px;">
    <span class="mi" style="font-size:16px;">arrow_back</span>
    처음 화면으로
  </a>
</div>

<script src="codibank.js"></script>
<script src="i18n.js"></script>
<script>
  // 이미 로그인된 경우 바로 이동
  if(window.CodiBank&&window.CodiBank.getCurrentUser&&window.CodiBank.getCurrentUser())
    location.replace('closet.html');

  function showErr(msg){const e=document.getElementById('loginErr');e.textContent=msg;e.classList.add('show');}
  function clearErr(){document.getElementById('loginErr').classList.remove('show');}

  // ★ 핵심 수정: async/await — CodiBank.login()은 Supabase 비동기 호출
  async function doLogin(){
    clearErr();
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('password').value;
    if(!email) return showErr('이메일을 입력해주세요.');
    if(!pw)    return showErr('비밀번호를 입력해주세요.');

    // 로딩 상태
    const btn = document.querySelector('.btn-primary');
    const orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = '로그인 중...';

    try {
      // CodiBank.login()이 Promise를 반환하는 경우와 동기 결과 모두 처리
      const res = await Promise.resolve(window.CodiBank.login(email, pw));

      if(res && res.ok){
        location.replace('closet.html');
      } else {
        const errMsg = (res && res.error) ? res.error : '로그인에 실패했습니다.';
        // Supabase 에러 메시지 한국어 변환
        const errKo = errMsg.includes('Invalid login credentials') ? '이메일 또는 비밀번호가 올바르지 않습니다.'
                    : errMsg.includes('Email not confirmed')        ? '이메일 인증이 필요합니다. 이메일을 확인해주세요.'
                    : errMsg.includes('User not found')             ? '가입된 계정을 찾을 수 없습니다.'
                    : errMsg.includes('Too many requests')          ? '잠시 후 다시 시도해주세요.'
                    : errMsg;
        showErr(errKo);
      }
    } catch(e) {
      showErr('로그인 중 오류가 발생했습니다: ' + (e.message || String(e)));
    } finally {
      btn.disabled = false;
      btn.textContent = orig;
    }
  }

  document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
