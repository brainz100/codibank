<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>CODIBANK - 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    min-height:100dvh; width:100%;
    background:#071952;
    color:#fff;
    font-family:'Pretendard','Noto Sans KR',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  .bg-mesh{
    background:
      radial-gradient(at 0% 0%,rgba(11,102,106,.30) 0px,transparent 55%),
      radial-gradient(at 100% 100%,rgba(53,162,159,.20) 0px,transparent 55%),
      #071952;
    min-height:100dvh;
  }
  .card{
    background:linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.04) 100%);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.13);
    border-radius:28px; padding:32px 28px;
    width:100%; max-width:420px;
  }
  .field-wrap{display:flex;flex-direction:column;gap:6px;}
  .field-label{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.04em;}
  .input{
    width:100%; background:rgba(255,255,255,.07);
    border:1.5px solid rgba(255,255,255,.16); border-radius:14px;
    padding:14px 16px; color:#fff; font-size:15px; outline:none;
    font-family:inherit; transition:border-color .2s;
  }
  .input:focus{border-color:#97FEED;}
  .input::placeholder{color:rgba(255,255,255,.32);}
  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:16px; cursor:pointer;
    background:linear-gradient(135deg,#0B666A,#35A29F);
    color:#fff; font-size:17px; font-weight:800; font-family:inherit;
    transition:transform .14s,filter .14s;
  }
  .btn-primary:active{transform:scale(.97);filter:brightness(.9);}
  .btn-naver{
    width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
    background:#03C75A;color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  }
  .btn-kakao{
    width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
    background:#FEE500;color:#3C1E1E;font-size:15px;font-weight:700;font-family:inherit;
  }
  .divider{display:flex;align-items:center;gap:12px;}
  .divider-line{flex:1;height:1px;background:rgba(255,255,255,.1);}
  .divider-txt{font-size:12px;color:rgba(255,255,255,.3);white-space:nowrap;}
  .err{color:#ff6b6b;font-size:13px;display:none;}
  .err.show{display:block;}
  .link-teal{color:#97FEED;font-weight:700;text-decoration:none;}
  .back-link{
    display:inline-flex;align-items:center;gap:4px;
    color:rgba(255,255,255,.38);font-size:13px;text-decoration:none;
    transition:color .2s;
  }
  .back-link:hover{color:rgba(255,255,255,.7);}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;}

/* ── CodiBank 공통 풋바 ── */
.cb-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 9000;
  background: rgba(7,25,82,0.94);
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-bottom: env(safe-area-inset-bottom);
}
.cb-nav-inner {
  display: flex; justify-content: space-between; align-items: flex-end;
  max-width: 480px; margin: 0 auto;
  padding: 10px 4px 6px;
}
.cb-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: rgba(255,255,255,0.38); text-decoration: none;
  font-size: 10px; font-weight: 600; letter-spacing: -.01em;
  padding: 0 2px; transition: color .18s;
  font-family: 'Pretendard','Noto Sans KR',sans-serif;
}
.cb-nav-item .cb-icon { font-size: 24px; font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24; }
.cb-nav-item.cb-active { color: #97FEED; }
.cb-nav-item.cb-active .cb-icon { font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.cb-nav-center {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  margin-bottom: 4px;
}
.cb-nav-plus-btn {
  width: 54px; height: 54px; border-radius: 50%;
  background: #97FEED;
  display: flex; align-items: center; justify-content: center;
  position: relative; top: -14px;
  box-shadow: 0 0 22px rgba(151,254,237,0.45);
  border: 4px solid #071952;
  cursor: pointer; text-decoration: none;
  transition: transform .15s;
}
.cb-nav-plus-btn:active { transform: scale(.92); }
.cb-nav-plus-btn .material-symbols-outlined {
  color: #071952; font-size: 28px;
  font-variation-settings: 'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;
}
.cb-nav-plus-label {
  color: #97FEED; font-size: 10px; font-weight: 700;
  margin-top: -10px; letter-spacing: -.01em;
  font-family: 'Pretendard','Noto Sans KR',sans-serif;
}
.cb-nav-spacer { height: 76px; }

</style>
</head>
<body class="bg-mesh">
<div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px 100px;">

  <a href="../index.html" style="font-size:28px;font-weight:900;letter-spacing:-.04em;color:#fff;text-decoration:none;margin-bottom:32px;">
    CODI<span style="color:#97FEED">BANK</span>
  </a>

  <div class="card">
    <h2 style="font-size:24px;font-weight:800;margin-bottom:4px;">로그인</h2>
    <p style="font-size:14px;color:rgba(255,255,255,.45);margin-bottom:28px;">코디뱅크 계정으로 시작하세요</p>

    <!-- 소셜 -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:24px;">
      <button class="btn-naver" onclick="socialLogin('naver')">네이버로 시작하기</button>
      <button class="btn-kakao" onclick="socialLogin('kakao')">카카오로 시작하기</button>
    </div>

    <div class="divider" style="margin-bottom:24px;">
      <div class="divider-line"></div>
      <span class="divider-txt">또는 이메일로 로그인</span>
      <div class="divider-line"></div>
    </div>

    <!-- 이메일 폼 -->
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="field-wrap">
        <label class="field-label">이메일</label>
        <input id="email" type="email" class="input" placeholder="example@email.com"/>
      </div>
      <div class="field-wrap">
        <label class="field-label">비밀번호</label>
        <input id="password" type="password" class="input" placeholder="비밀번호"/>
      </div>
      <p id="loginErr" class="err"></p>
      <button class="btn-primary" onclick="doLogin()">로그인</button>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:14px;color:rgba(255,255,255,.38);">
      계정이 없으신가요? <a href="signup.html" class="link-teal">회원가입</a>
    </p>
  </div>

  <a href="../index.html" class="back-link" style="margin-top:24px;">
    <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
    처음 화면으로
  </a>
</div>


<!-- ── CodiBank 공통 풋바 ── -->
<nav class="cb-nav" aria-label="하단 네비게이션">
  <div class="cb-nav-inner">
    <a href="closet.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">grid_view</span>
      <span>내옷장</span>
    </a>
    <a href="album.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">auto_awesome_motion</span>
      <span>코디앨범</span>
    </a>
    <div class="cb-nav-center">
      <a href="camera.html" class="cb-nav-plus-btn">
        <span class="material-symbols-outlined">add</span>
      </a>
      <span class="cb-nav-plus-label">ITEM등록</span>
    </div>
    <a href="share-sale.html" class="cb-nav-item">
      <span class="material-symbols-outlined cb-icon">local_mall</span>
      <span>공유판매</span>
    </a>
    <a href="mypage.html" class="cb-nav-item cb-active">
      <span class="material-symbols-outlined cb-icon">person_outline</span>
      <span>MY</span>
    </a>
  </div>
</nav>
<div class="cb-nav-spacer"></div>


<script src="codibank.js"></script>
<script>
  if(window.CodiBank&&window.CodiBank.getCurrentUser&&window.CodiBank.getCurrentUser())
    location.replace('closet.html');

  function showErr(msg){const e=document.getElementById('loginErr');e.textContent=msg;e.classList.add('show');}
  function clearErr(){document.getElementById('loginErr').classList.remove('show');}

  function doLogin(){
    clearErr();
    const email=document.getElementById('email').value.trim();
    const pw=document.getElementById('password').value;
    if(!email)return showErr('이메일을 입력해주세요.');
    if(!pw)return showErr('비밀번호를 입력해주세요.');
    const res=window.CodiBank.login(email,pw);
    if(res.ok)location.replace('closet.html');
    else showErr(res.error||'로그인에 실패했습니다.');
  }
  function socialLogin(p){
    const res=window.CodiBank.socialLogin(p);
    if(res.ok)location.replace('closet.html');
    else showErr(res.error||'소셜 로그인에 실패했습니다.');
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
