<!DOCTYPE html>
<html class="dark" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>CODIBANK - 로그인</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Pretendard', sans-serif; background: #071952; color: #fff; min-height: 100dvh; }
  .glass { background: linear-gradient(135deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.03) 100%); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,.12); }
  .input-field {
    width: 100%; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.15);
    border-radius: 14px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none;
    transition: border-color .2s;
  }
  .input-field:focus { border-color: #97FEED; }
  .input-field::placeholder { color: rgba(255,255,255,.35); }
  .btn-primary { background: linear-gradient(135deg,#0B666A,#35A29F); color: #fff; font-weight: 800; border: none; border-radius: 16px; padding: 16px; font-size: 17px; cursor: pointer; width: 100%; transition: transform .15s, filter .15s; }
  .btn-primary:active { transform: scale(.97); filter: brightness(.9); }
  .btn-outline { background: transparent; border: 1.5px solid #35A29F; color: #ccc; font-weight: 600; border-radius: 16px; padding: 14px; font-size: 15px; cursor: pointer; width: 100%; transition: background .2s; }
  .btn-outline:hover { background: rgba(53,162,159,.1); }
  .btn-naver  { background: #03C75A; color: #fff; font-weight: 700; border: none; border-radius: 14px; padding: 14px; cursor: pointer; width: 100%; font-size: 15px; }
  .btn-kakao  { background: #FEE500; color: #3C1E1E; font-weight: 700; border: none; border-radius: 14px; padding: 14px; cursor: pointer; width: 100%; font-size: 15px; }
  .err-msg { color: #ff6b6b; font-size: 13px; margin-top: 6px; display: none; }
  .err-msg.show { display: block; }
  .bg-mesh {
    background:
      radial-gradient(at 0% 0%, rgba(11,102,106,.28) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(53,162,159,.18) 0px, transparent 50%);
  }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24; }
</style>
</head>
<body class="bg-mesh">

<div class="min-h-screen flex flex-col items-center justify-center px-5 py-12">

  <!-- 로고 -->
  <a href="../index.html" class="mb-8 text-3xl font-black tracking-tighter">
    CODI<span style="color:#97FEED">BANK</span>
  </a>

  <!-- 카드 -->
  <div class="glass rounded-[28px] w-full max-w-[400px] p-8">

    <h2 class="text-2xl font-extrabold mb-1">로그인</h2>
    <p class="text-sm text-white/50 mb-7">코디뱅크 계정으로 시작하세요</p>

    <!-- 소셜 로그인 -->
    <div class="space-y-3 mb-6">
      <button class="btn-naver" onclick="socialLogin('naver')">네이버로 시작하기</button>
      <button class="btn-kakao" onclick="socialLogin('kakao')">카카오로 시작하기</button>
    </div>

    <div class="flex items-center gap-3 mb-6">
      <div class="flex-1 h-px bg-white/10"></div>
      <span class="text-xs text-white/30">또는 이메일로 로그인</span>
      <div class="flex-1 h-px bg-white/10"></div>
    </div>

    <!-- 이메일 로그인 폼 -->
    <div class="space-y-4">
      <div>
        <input id="email" type="email" class="input-field" placeholder="이메일 (아이디)"/>
      </div>
      <div class="relative">
        <input id="password" type="password" class="input-field" placeholder="비밀번호"/>
      </div>
      <p id="loginErr" class="err-msg"></p>
      <button class="btn-primary mt-2" onclick="doLogin()">로그인</button>
    </div>

    <!-- 구분선 -->
    <div class="mt-6 text-center">
      <span class="text-sm text-white/40">계정이 없으신가요? </span>
      <a href="signup.html" class="text-sm font-bold" style="color:#97FEED">회원가입</a>
    </div>
  </div>

  <!-- 뒤로가기 -->
  <a href="../index.html" class="mt-6 flex items-center gap-1 text-sm text-white/40 hover:text-white/70 transition-colors">
    <span class="material-symbols-outlined text-base">arrow_back</span>
    처음 화면으로
  </a>
</div>

<script src="codibank.js"></script>
<script>
  // 이미 로그인된 경우 closet으로
  if (window.CodiBank && window.CodiBank.getCurrentUser && window.CodiBank.getCurrentUser()) {
    location.replace('closet.html');
  }

  function showErr(msg) {
    const el = document.getElementById('loginErr');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearErr() {
    document.getElementById('loginErr').classList.remove('show');
  }

  function doLogin() {
    clearErr();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email)    return showErr('이메일을 입력해주세요.');
    if (!password) return showErr('비밀번호를 입력해주세요.');

    const res = window.CodiBank.login(email, password);
    if (res.ok) {
      location.replace('closet.html');
    } else {
      showErr(res.error || '로그인에 실패했습니다.');
    }
  }

  function socialLogin(provider) {
    const res = window.CodiBank.socialLogin(provider);
    if (res.ok) {
      location.replace('closet.html');
    } else {
      showErr(res.error || '소셜 로그인에 실패했습니다.');
    }
  }

  // Enter 키 지원
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
